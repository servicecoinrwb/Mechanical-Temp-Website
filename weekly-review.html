<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Weekly Review Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --navy:#16263f; --navy2:#1f3350; --sky:#6fb7e3; --cream:#f5efe3;
    --rust:#b5512f; --line:#d8cdba; --ink:#2a3341; --muted:#7a8496;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:Barlow,system-ui,sans-serif;background:var(--cream);color:var(--ink);
    min-height:100vh;
  }
  .app{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:100vh}
  @media (max-width:900px){.app{grid-template-columns:1fr}}

  /* ---- Controls ---- */
  .controls{
    background:var(--cream);border-right:1px solid var(--line);
    padding:22px 20px 60px;overflow-y:auto;max-height:100vh;
  }
  @media (max-width:900px){.controls{max-height:none;border-right:none;border-bottom:1px solid var(--line)}}
  .brandbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .brandbar .dot{width:34px;height:34px;border-radius:8px;background:var(--navy);
    display:flex;align-items:center;justify-content:center;color:var(--sky);
    font-family:Oswald;font-weight:700;font-size:18px}
  .brandbar h1{font-family:Oswald;font-weight:600;font-size:18px;letter-spacing:.02em;
    color:var(--navy);margin:0;line-height:1.1}
  .brandbar p{margin:2px 0 0;font-size:11px;color:var(--muted)}

  .sec{margin-top:18px}
  .sec > .lbl{font-family:Oswald;font-weight:600;font-size:11px;text-transform:uppercase;
    letter-spacing:.09em;color:var(--rust);margin-bottom:8px}
  label.field{display:block;margin-bottom:10px}
  label.field span{display:block;font-size:11px;font-weight:600;color:var(--navy);
    margin-bottom:4px;letter-spacing:.02em}
  input[type=text],textarea{
    width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;
    background:#fff;font-family:Barlow;font-size:13.5px;color:var(--ink);resize:vertical}
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--sky)}
  textarea{min-height:60px;line-height:1.4}

  .job{background:#fff;border:1.5px solid var(--line);border-radius:12px;
    padding:13px;margin-bottom:12px;position:relative}
  .job .jhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .job .jnum{font-family:Oswald;font-weight:600;font-size:12px;color:var(--navy);
    text-transform:uppercase;letter-spacing:.06em}
  .job .jtools{display:flex;gap:4px}
  .icbtn{border:1.5px solid var(--line);background:var(--cream);border-radius:6px;
    width:26px;height:26px;cursor:pointer;font-size:13px;line-height:1;color:var(--navy);
    display:flex;align-items:center;justify-content:center;padding:0}
  .icbtn:hover{border-color:var(--sky)}
  .icbtn.danger:hover{border-color:var(--rust);color:var(--rust)}
  .icbtn:disabled{opacity:.35;cursor:default}

  .imgrow{display:flex;gap:8px;margin-bottom:9px}
  .thumb{width:66px;height:66px;flex:0 0 66px;border-radius:8px;border:1.5px dashed var(--line);
    background:var(--cream);overflow:hidden;display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--muted);text-align:center;padding:4px}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .imgctrls{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .imgctrls .row2{display:flex;gap:6px}
  .filebtn{flex:1;text-align:center;border:1.5px solid var(--navy);background:var(--navy);
    color:#fff;border-radius:7px;padding:7px 8px;font-size:11.5px;font-weight:600;cursor:pointer;
    font-family:Barlow;white-space:nowrap}
  .filebtn:hover{background:var(--navy2)}
  .clrbtn{border:1.5px solid var(--line);background:#fff;border-radius:7px;padding:7px 9px;
    font-size:11.5px;color:var(--muted);cursor:pointer;font-family:Barlow}
  .clrbtn:hover{border-color:var(--rust);color:var(--rust)}
  input.url{font-size:12px;padding:7px 9px}

  .segrow{display:flex;gap:6px;margin-top:2px}
  .seg{flex:1}
  .seg .lbl2{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
  .seg .opts{display:flex;border:1.5px solid var(--line);border-radius:7px;overflow:hidden}
  .seg .opts button{flex:1;border:none;background:#fff;padding:6px 4px;font-size:11px;
    cursor:pointer;font-family:Barlow;color:var(--muted);border-right:1px solid var(--line)}
  .seg .opts button:last-child{border-right:none}
  .seg .opts button.on{background:var(--sky);color:var(--navy);font-weight:700}

  .addbtn{width:100%;border:1.5px dashed var(--sky);background:#fff;color:var(--navy);
    border-radius:10px;padding:11px;font-family:Oswald;font-weight:600;font-size:13px;
    letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .addbtn:hover{background:#eef6fc}

  .toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--navy);cursor:pointer;margin-top:6px}
  .toggle input{width:16px;height:16px;accent-color:var(--rust)}

  /* ---- Stage ---- */
  .stage{padding:24px;overflow:auto;background:
    repeating-linear-gradient(45deg,#efe7d8,#efe7d8 12px,#ece3d2 12px,#ece3d2 24px)}
  .exportbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:18px;
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .exportbar .grp{display:flex;align-items:center;gap:6px}
  .exportbar .glabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
  .ratiobtn{border:1.5px solid var(--line);background:var(--cream);border-radius:7px;padding:7px 11px;
    font-size:12px;font-family:Barlow;color:var(--navy);cursor:pointer}
  .ratiobtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .spacer{flex:1}
  .actbtn{border:none;border-radius:8px;padding:9px 15px;font-family:Oswald;font-weight:600;
    font-size:13px;letter-spacing:.03em;cursor:pointer;text-transform:uppercase}
  .actbtn.primary{background:var(--rust);color:#fff}
  .actbtn.primary:hover{background:#9d4526}
  .actbtn.ghost{background:#fff;border:1.5px solid var(--navy);color:var(--navy)}
  .actbtn.ghost:hover{background:var(--navy);color:#fff}
  .hint{font-size:11px;color:var(--muted);margin:8px 2px 0;line-height:1.4}
  .exportmsg{font-size:12px;color:var(--rust);margin-left:4px;font-weight:600}

  .posterframe{display:flex;justify-content:center}
  /* Poster: authored at 1080px, scaled to fit the stage for preview */
  .poster{
    width:1080px;position:relative;background:var(--navy);
    transform-origin:top center;
  }
  .p-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat}
  .p-scrim{position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,
      rgba(16,26,40,calc(var(--scrim,0.5) + 0.12)) 0%,
      rgba(16,26,40,var(--scrim,0.5)) 40%,
      rgba(16,26,40,calc(var(--scrim,0.5) + 0.05)) 100%)}
  .p-inner{position:relative;z-index:2;padding:64px 66px 34px}
  .p-title{font-family:Oswald;font-weight:600;font-size:60px;line-height:1.04;margin:0;
    letter-spacing:.005em;color:var(--txt,#fff);text-shadow:0 2px 14px rgba(0,0,0,.55)}
  .p-loc{font-family:Barlow;font-weight:600;font-size:26px;color:var(--sky);margin:10px 0 0;
    letter-spacing:.02em;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .p-rule{height:5px;width:120px;background:var(--rust);border-radius:3px;margin:22px 0 40px}
  .p-jobs{display:flex;flex-direction:column;gap:36px}
  .p-job{display:flex;gap:34px;align-items:flex-start}
  .p-job.right{flex-direction:row-reverse}
  .p-job.wide{flex-direction:column;gap:22px}
  .p-photo{border:4px solid var(--sky);border-radius:10px;overflow:hidden;flex:0 0 auto;
    background:var(--navy2);display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .p-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .p-photo .ph{color:#c9d6e6;font-family:Barlow;font-size:16px;padding:20px;text-align:center}
  .size-s .p-photo{width:220px;height:220px}
  .size-m .p-photo{width:320px;height:260px}
  .size-l .p-photo{width:440px;height:340px}
  .p-job.wide .p-photo{width:100%;height:380px}
  .p-cap{font-family:Barlow;font-weight:500;font-size:29px;line-height:1.34;flex:1;padding-top:6px;
    color:var(--txt,#fff);text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .p-job.wide .p-cap{padding-top:0}
  .p-signoff{font-family:Barlow;font-weight:500;font-style:italic;font-size:27px;line-height:1.4;
    margin-top:44px;padding-top:28px;border-top:2px solid rgba(111,183,227,.4);
    color:var(--txt,#fff);text-shadow:0 2px 12px rgba(0,0,0,.6)}
  /* black contact bar over the image at the bottom */
  .p-foot{position:relative;z-index:2;background:#000;padding:26px 40px;
    display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .p-foot img{height:44px;width:auto;display:block;flex:0 0 auto}
  .p-foot .fword{font-family:Oswald;font-weight:700;font-size:26px;letter-spacing:.06em;color:#fff;flex:0 0 auto}
  .p-foot .ftxt{font-family:Barlow;font-size:20px;color:#cdd8e6;line-height:1.3}
  .p-foot .ftxt b{color:#fff;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <!-- ============ CONTROLS ============ -->
  <div class="controls">
    <div class="brandbar">
      <div class="dot">MT</div>
      <div>
        <h1>Weekly Review Builder</h1>
        <p>Recap your week &mdash; export for any platform</p>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">Header</div>
      <label class="field"><span>Title</span>
        <input type="text" id="fTitle" placeholder="This week's review at Mechanical Temp"></label>
      <label class="field"><span>Location / subtitle (optional)</span>
        <input type="text" id="fLoc" placeholder="Southfield, MI"></label>
    </div>

    <div class="sec">
      <div class="lbl">Background image</div>
      <div class="imgrow">
        <div class="thumb" id="heroThumb">no image</div>
        <div class="imgctrls">
          <div class="row2">
            <label class="filebtn">Upload background<input type="file" accept="image/*" id="heroFile" style="display:none"></label>
            <button class="clrbtn" id="heroClr">Clear</button>
          </div>
          <input type="text" class="url" id="heroUrl" placeholder="or paste image URL (e.g. your van hero)">
        </div>
      </div>
      <label class="field" style="margin-top:4px"><span>Darken photo for readability</span>
        <input type="range" id="fScrim" min="20" max="80" step="5" value="50" style="width:100%;accent-color:var(--rust)"></label>
      <label class="field" style="margin-top:2px"><span>Text shade (white &rarr; black)</span>
        <input type="range" id="fTextShade" min="0" max="100" step="5" value="0" style="width:100%;accent-color:var(--rust)"></label>
    </div>

    <div class="sec">
      <div class="lbl">The week's jobs</div>
      <div id="jobs"></div>
      <button class="addbtn" id="addJob">+ Add a job</button>
    </div>

    <div class="sec">
      <div class="lbl">Sign-off</div>
      <label class="field">
        <textarea id="fSign" placeholder="Well, that sums up the week. Everyone stay safe out there — and remember to change your thermostat batteries and check those filters."></textarea>
      </label>
      <label class="toggle"><input type="checkbox" id="fFoot" checked>
        Show footer (name, license, phone, site)</label>
    </div>
  </div>

  <!-- ============ STAGE ============ -->
  <div class="stage">
    <div class="exportbar">
      <div class="grp">
        <span class="glabel">Shape</span>
        <button class="ratiobtn on" data-ratio="feed">Feed 4:5</button>
        <button class="ratiobtn" data-ratio="square">Square</button>
        <button class="ratiobtn" data-ratio="story">Story 9:16</button>
        <button class="ratiobtn" data-ratio="auto">Auto</button>
      </div>
      <div class="spacer"></div>
      <button class="actbtn ghost" id="copyCap">Copy caption text</button>
      <button class="actbtn primary" id="dlPng">Download PNG</button>
      <span class="exportmsg" id="expMsg"></span>
    </div>
    <div class="posterframe">
      <div class="poster ratio-feed" id="poster"></div>
    </div>
    <p class="hint" id="stageHint"></p>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const LSKEY = 'mt_weekly_review_v1';

  const RATIO = { feed:1.25, square:1.0, story:1.7778, auto:0 };

  const LOGO_URL = 'https://cdn.mechanicaltemp.com/logos/white/text/white_textlogo_black_background.png';
  let LOGO_SRC = '';   // becomes an embedded data URL if the CDN allows it

  async function loadLogo(){
    try{
      const r = await fetch(LOGO_URL, { mode:'cors', cache:'force-cache' });
      if(!r.ok) throw new Error('bad status');
      const blob = await r.blob();
      LOGO_SRC = await new Promise((res,rej)=>{
        const fr = new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(blob);
      });
    }catch(e){
      LOGO_SRC = '';   // CORS-blocked: preview uses the remote logo, PNG uses the wordmark
    }
    renderPoster();
  }

  const state = {
    title:'', loc:'', sign:'', foot:true, ratio:'feed',
    hero:'', heroIsData:false, scrim:50, textShade:0,
    jobs:[]
  };
  function blankJob(){ return { img:'', isData:false, cap:'', size:'m', side:'left' }; }

  // Fetch a remote image and return a data URL (export-safe), or null if blocked.
  async function embedUrl(url){
    try{
      const r = await fetch(url, { mode:'cors', cache:'force-cache' });
      if(!r.ok) throw new Error('bad status');
      const blob = await r.blob();
      return await new Promise((res,rej)=>{
        const fr = new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(blob);
      });
    }catch(e){ return null; }
  }

  // ---------- persistence ----------
  function save(){
    try{
      localStorage.setItem(LSKEY, JSON.stringify(state));
    }catch(e){
      // Likely quota from uploaded image data. Save a copy without image data.
      try{
        const lite = JSON.parse(JSON.stringify(state));
        lite.jobs = lite.jobs.map(j => j.isData ? Object.assign({}, j, {img:'', isData:false}) : j);
        localStorage.setItem(LSKEY, JSON.stringify(lite));
      }catch(_){}
    }
  }
  function load(){
    try{
      const raw = localStorage.getItem(LSKEY);
      if(!raw) return false;
      const d = JSON.parse(raw);
      Object.assign(state, d);
      if(!Array.isArray(state.jobs)) state.jobs = [];
      return true;
    }catch(e){ return false; }
  }

  // ---------- controls render ----------
  function renderJobs(){
    const host = $('jobs'); host.innerHTML = '';
    state.jobs.forEach((job, i)=>{
      const card = document.createElement('div'); card.className = 'job';
      card.innerHTML =
        '<div class="jhead">'+
          '<span class="jnum">Job '+(i+1)+'</span>'+
          '<div class="jtools">'+
            '<button class="icbtn" data-act="up" '+(i===0?'disabled':'')+' title="Move up">&#9650;</button>'+
            '<button class="icbtn" data-act="down" '+(i===state.jobs.length-1?'disabled':'')+' title="Move down">&#9660;</button>'+
            '<button class="icbtn danger" data-act="del" title="Remove">&times;</button>'+
          '</div>'+
        '</div>'+
        '<div class="imgrow">'+
          '<div class="thumb">'+(job.img
              ? '<img src="'+escAttr(job.img)+'" alt="">'
              : 'no photo')+'</div>'+
          '<div class="imgctrls">'+
            '<div class="row2">'+
              '<label class="filebtn">Upload photo'+
                '<input type="file" accept="image/*" data-act="file" style="display:none"></label>'+
              (job.img ? '<button class="clrbtn" data-act="clr">Clear</button>' : '')+
            '</div>'+
            '<input type="text" class="url" data-act="url" placeholder="or paste raw image URL" value="'+escAttr(job.isData?'':job.img)+'">'+
          '</div>'+
        '</div>'+
        '<label class="field" style="margin-bottom:8px"><span>Caption</span>'+
          '<textarea data-act="cap" placeholder="What was the job? Keep it short and human.">'+escHtml(job.cap)+'</textarea></label>'+
        '<div class="segrow">'+
          '<div class="seg"><div class="lbl2">Photo size</div><div class="opts" data-group="size">'+
            sizeBtn('s','S',job.size)+sizeBtn('m','M',job.size)+sizeBtn('l','L',job.size)+sizeBtn('wide','Wide',job.size)+
          '</div></div>'+
          '<div class="seg"><div class="lbl2">Photo side</div><div class="opts" data-group="side">'+
            sideBtn('left','Left',job.side)+sideBtn('right','Right',job.side)+
          '</div></div>'+
        '</div>';
      wireJob(card, i);
      host.appendChild(card);
    });
  }
  function sizeBtn(v,l,cur){ return '<button data-val="'+v+'" class="'+(cur===v?'on':'')+'">'+l+'</button>'; }
  function sideBtn(v,l,cur){ return '<button data-val="'+v+'" class="'+(cur===v?'on':'')+'">'+l+'</button>'; }

  function wireJob(card, i){
    card.querySelectorAll('[data-act]').forEach(el=>{
      const act = el.getAttribute('data-act');
      if(act==='file'){
        el.addEventListener('change', e=>{
          const f = e.target.files && e.target.files[0]; if(!f) return;
          const rd = new FileReader();
          rd.onload = ()=>{ state.jobs[i].img = rd.result; state.jobs[i].isData = true; save(); renderJobs(); renderPoster(); };
          rd.readAsDataURL(f);
        });
      } else if(act==='clr'){
        el.addEventListener('click', ()=>{ state.jobs[i].img=''; state.jobs[i].isData=false; save(); renderJobs(); renderPoster(); });
      } else if(act==='url'){
        el.addEventListener('input', ()=>{ state.jobs[i].img = el.value.trim(); state.jobs[i].isData=false; save(); renderPoster(); updateThumb(card,i); });
      } else if(act==='cap'){
        el.addEventListener('input', ()=>{ state.jobs[i].cap = el.value; save(); renderPoster(); });
      } else if(act==='up'){
        el.addEventListener('click', ()=>{ if(i>0){ swap(i,i-1); } });
      } else if(act==='down'){
        el.addEventListener('click', ()=>{ if(i<state.jobs.length-1){ swap(i,i+1); } });
      } else if(act==='del'){
        el.addEventListener('click', ()=>{ state.jobs.splice(i,1); if(!state.jobs.length) state.jobs.push(blankJob()); save(); renderJobs(); renderPoster(); });
      }
    });
    card.querySelectorAll('[data-group] button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const group = btn.parentElement.getAttribute('data-group');
        state.jobs[i][group] = btn.getAttribute('data-val');
        save(); renderJobs(); renderPoster();
      });
    });
  }
  function updateThumb(card,i){
    const t = card.querySelector('.thumb');
    const url = state.jobs[i].img;
    t.innerHTML = url ? '<img src="'+escAttr(url)+'" alt="">' : 'no photo';
  }
  function swap(a,b){ const t=state.jobs[a]; state.jobs[a]=state.jobs[b]; state.jobs[b]=t; save(); renderJobs(); renderPoster(); }

  // ---------- poster render ----------
  function renderPoster(forExport){
    const p = $('poster');
    p.className = 'poster ratio-'+state.ratio;
    const f = RATIO[state.ratio] || 0;
    p.style.minHeight = '0';   // block poster grows with content; footer pinned via inner min-height
    p.style.setProperty('--scrim', (state.scrim/100).toFixed(2));
    const tv = Math.round(255*(1 - (state.textShade||0)/100));
    p.style.setProperty('--txt', 'rgb('+tv+','+tv+','+tv+')');

    // hero background: embedded data URL is export-safe; remote URL shows in
    // preview but is dropped from the PNG (would taint the canvas)
    const heroSrc = state.heroIsData ? state.hero : (forExport ? '' : state.hero);
    // footer logo: embedded data URL exports; else wordmark
    const logo = LOGO_SRC || (forExport ? '' : (LOGO_URL || ''));

    let html = '';
    html += '<div class="p-bg" style="'+(heroSrc?'background-image:url('+escAttr(heroSrc)+')':'')+'"></div>';
    html += '<div class="p-scrim"></div>';

    html += '<div class="p-inner">';
    html += '<h2 class="p-title">'+escHtml(state.title || "This week's review at Mechanical Temp")+'</h2>';
    if(state.loc.trim()) html += '<div class="p-loc">'+escHtml(state.loc)+'</div>';
    html += '<div class="p-rule"></div>';
    html += '<div class="p-jobs">';
    state.jobs.forEach(job=>{
      const wide = job.size==='wide';
      const cls = 'p-job size-'+job.size+' '+(wide?'wide':job.side);
      const photo = '<div class="p-photo">'+(job.img
          ? '<img src="'+escAttr(job.img)+'" crossorigin="anonymous" alt="">'
          : '<div class="ph">Photo goes here</div>')+'</div>';
      const cap = '<div class="p-cap">'+escHtml(job.cap||'Describe this job\u2026')+'</div>';
      html += '<div class="'+cls+'">'+photo+cap+'</div>';
    });
    html += '</div>';
    if(state.sign.trim())
      html += '<div class="p-signoff">'+escHtml(state.sign)+'</div>';
    html += '</div>'; // /p-inner

    if(state.foot)
      html += '<div class="p-foot">'+
        (logo ? '<img src="'+escAttr(logo)+'" alt="Mechanical Temp">' : '<span class="fword">MECHANICAL&nbsp;TEMP</span>')+
        '<div class="ftxt"><b>Mechanical Temp LLC</b> &nbsp;&middot;&nbsp; Licensed &amp; Insured '+
        '&nbsp;&middot;&nbsp; (313) 282-4758 &nbsp;&middot;&nbsp; mechanicaltemp.com</div></div>';

    p.innerHTML = html;
    // shape height is the floor: fill the inner content so the footer sits at the
    // bottom on short weeks, while a tall week just grows the whole card
    const innerEl = p.querySelector('.p-inner');
    if(innerEl) innerEl.style.minHeight = f ? Math.max(0, Math.round(1080*f) - 100) + 'px' : '0';
    if(!forExport) fitPoster();
  }

  // scale the 1080px poster down to fit the stage width (preview only)
  function fitPoster(){
    const p = $('poster');
    const frame = p.parentElement;
    const naturalH = p.offsetHeight || 1;        // true height at 1080 (ignores transform)
    const availW = frame.clientWidth;
    const topY = frame.getBoundingClientRect().top;
    const availH = Math.max(360, window.innerHeight - topY - 28);
    // fit within the space, but cap so it never balloons on a wide monitor
    let scale = Math.min(availW/1080, availH/naturalH, 0.62);
    scale = Math.max(scale, 0.22);
    p.style.transform = 'scale('+scale+')';
    frame.style.height = (naturalH*scale) + 'px';
  }
  window.addEventListener('resize', fitPoster);

  // ---------- header + ratio wiring ----------
  $('fTitle').addEventListener('input', e=>{ state.title=e.target.value; save(); renderPoster(); });
  $('fLoc').addEventListener('input', e=>{ state.loc=e.target.value; save(); renderPoster(); });
  $('fSign').addEventListener('input', e=>{ state.sign=e.target.value; save(); renderPoster(); });
  $('fFoot').addEventListener('change', e=>{ state.foot=e.target.checked; save(); renderPoster(); });
  $('addJob').addEventListener('click', ()=>{ state.jobs.push(blankJob()); save(); renderJobs(); renderPoster(); });

  // hero background controls
  function setHeroThumb(){
    const t = $('heroThumb');
    t.innerHTML = state.hero ? '<img src="'+escAttr(state.hero)+'" alt="">' : 'no image';
  }
  $('heroFile').addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = ()=>{ state.hero=rd.result; state.heroIsData=true; save(); setHeroThumb(); renderPoster(); };
    rd.readAsDataURL(f);
  });
  $('heroUrl').addEventListener('input', async e=>{
    const url = e.target.value.trim();
    if(!url){ state.hero=''; state.heroIsData=false; save(); setHeroThumb(); renderPoster(); return; }
    state.hero = url; state.heroIsData = false; setHeroThumb(); renderPoster();
    // try to embed so the PNG can include it
    const data = await embedUrl(url);
    if(data && $('heroUrl').value.trim()===url){ state.hero=data; state.heroIsData=true; save(); setHeroThumb(); renderPoster(); }
    else save();
  });
  $('heroClr').addEventListener('click', ()=>{
    state.hero=''; state.heroIsData=false; $('heroUrl').value=''; save(); setHeroThumb(); renderPoster();
  });
  $('fScrim').addEventListener('input', e=>{ state.scrim=+e.target.value; save(); renderPoster(); });
  $('fTextShade').addEventListener('input', e=>{ state.textShade=+e.target.value; save(); renderPoster(); });

  document.querySelectorAll('.ratiobtn').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('.ratiobtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      state.ratio = b.getAttribute('data-ratio'); save(); renderPoster();
    });
  });

  // ---------- export ----------
  function imagesReady(el){
    const imgs = Array.prototype.slice.call(el.querySelectorAll('img'));
    return Promise.all(imgs.map(img=> (img.complete && img.naturalWidth)
      ? Promise.resolve()
      : new Promise(res=>{ img.onload=res; img.onerror=res; })));
  }
  $('dlPng').addEventListener('click', async ()=>{
    const msg = $('expMsg'); msg.style.color='var(--muted)'; msg.textContent='Rendering\u2026';
    const p = $('poster');
    // capture at true 1080 width, off-screen to avoid a visible jump
    p.style.transform='none';
    p.style.position='fixed'; p.style.left='-10000px'; p.style.top='0'; p.style.zIndex='-1';
    renderPoster(true);   // export-safe: uses embedded logo or wordmark, no fitPoster
    p.style.transform='none';
    try{
      await imagesReady(p);
      const canvas = await html2canvas(p, {useCORS:true, scale:2, backgroundColor:'#16263f', logging:false});
      const a = document.createElement('a');
      a.download = 'mt-weekly-review-'+stamp()+'.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      msg.style.color='var(--muted)'; msg.textContent='Saved.';
      setTimeout(()=>{ msg.textContent=''; }, 2500);
    }catch(err){
      msg.style.color='var(--rust)';
      msg.textContent='Export blocked by a photo\u2019s host. Use Upload photo for that job.';
    }finally{
      p.style.position=''; p.style.left=''; p.style.top=''; p.style.zIndex='';
      renderPoster(false);   // restore preview
    }
  });

  $('copyCap').addEventListener('click', async ()=>{
    const msg = $('expMsg');
    const parts = [];
    parts.push(state.title || "This week's review at Mechanical Temp");
    if(state.loc.trim()) parts.push(state.loc.trim());
    parts.push('');
    state.jobs.forEach((j,idx)=>{ if(j.cap.trim()) parts.push('\u2022 '+j.cap.trim()); });
    if(state.sign.trim()){ parts.push(''); parts.push(state.sign.trim()); }
    if(state.foot){ parts.push(''); parts.push('Mechanical Temp LLC \u00B7 Licensed & Insured \u00B7 (313) 282-4758 \u00B7 mechanicaltemp.com'); }
    const text = parts.join('\n');
    try{
      await navigator.clipboard.writeText(text);
      msg.style.color='var(--muted)'; msg.textContent='Caption copied.';
      setTimeout(()=>{ msg.textContent=''; }, 2500);
    }catch(e){
      msg.style.color='var(--rust)'; msg.textContent='Copy failed \u2014 select the text manually.';
    }
  });

  // ---------- helpers ----------
  function escHtml(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>'); }
  function escAttr(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function stamp(){ const d=new Date(); const p=n=>String(n).padStart(2,'0');
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }

  // ---------- init ----------
  function init(){
    const had = load();
    if(!had || !state.jobs.length){
      state.title = "This week's review at Mechanical Temp";
      state.loc = 'Southfield, MI';
      state.sign = "Well, that sums up the week. Everyone stay safe out there \u2014 and remember to change your thermostat batteries and check those filters.";
      state.foot = true; state.ratio = 'feed';
      state.jobs = [
        Object.assign(blankJob(), {cap:"Customer was told she needed a whole new AC unit. We saved her money \u2014 the 10-year-old system just needed a new compressor.", size:'m', side:'left'}),
        Object.assign(blankJob(), {cap:"Wrapped up a new-construction duct job out in West Bloomfield.", size:'m', side:'right'}),
        Object.assign(blankJob(), {cap:"Got a walk-in cooler back up and running in Dearborn for one of our longest-standing clients.", size:'m', side:'left'})
      ];
    }
    // reflect into header fields
    $('fTitle').value = state.title || '';
    $('fLoc').value = state.loc || '';
    $('fSign').value = state.sign || '';
    $('fFoot').checked = !!state.foot;
    $('fScrim').value = state.scrim || 50;
    $('fTextShade').value = state.textShade || 0;
    $('heroUrl').value = state.heroIsData ? '' : (state.hero || '');
    setHeroThumb();
    document.querySelectorAll('.ratiobtn').forEach(x=>x.classList.toggle('on', x.getAttribute('data-ratio')===state.ratio));
    renderJobs();
    renderPoster();
    loadLogo();
    $('stageHint').innerHTML = 'Uploaded photos export most reliably. Pasted URLs work too if the host allows it '+
      '(raw GitHub links usually do) \u2014 if a download is blocked, upload that one photo instead. '+
      'Your work autosaves on this device.';
  }
  init();
})();
</script>
</body>
</html>
