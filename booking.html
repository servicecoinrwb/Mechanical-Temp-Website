        const ALL_ITEMS = categories.flatMap(cat =>
            cat.items.map(it => ({ ...it, categoryId: cat.id, categoryTitle: cat.title }))

        /* ============================================================
           CASS — the AI concierge
           ============================================================ */
        const CASS_SYSTEM_PROMPT = `You are Cass, the AI concierge for Mechanical Temp LLC — a commercial & residential HVAC contractor in Southfield, MI (23093 Telegraph Rd). You greet visitors on the website and help them get to the right service quickly.

You are the FIRST point of contact, like a warm, knowledgeable receptionist who happens to know HVAC.

YOUR BOOKABLE SERVICE MENU (these are the ONLY services someone can book directly here — use the exact IDs):
${JSON.stringify(ALL_ITEMS.map(i => ({ id: i.id, name: i.name, price: i.price, description: i.description, category: i.categoryTitle })), null, 2)}

How you work:
1. Listen to what's happening with their system. Ask 1-2 short clarifying questions if needed — don't interrogate, this is a website not a phone call.
2. When you have enough info, recommend specific menu item(s) by ID in the "suggest" array. The customer will see them as clickable cards under the chat.
3. If their issue is BEYOND the menu (multi-building commercial quote, national account dispatch, complex install requiring estimate), set intent to "quote_request" or "national_account", tell them you'll have Brian (the owner) call them, and ask for their name + phone number.
4. For general questions (hours, service area, what kind of work you do) — answer briefly and offer to help with a booking.
5. Service area: metro Detroit / Southeast Michigan. Open 7am-7pm. Phone is ${BUSINESS_PHONE} if they want to call directly.

Tone: Warm, plain-spoken, like a real receptionist. Short responses — usually 2-3 sentences. No bullet lists in the reply. Don't say "I understand" or "I'm sorry to hear that" robotically. Don't use emoji.

Respond ONLY with a JSON object in this exact shape (no markdown fences, no preamble, no trailing text):
{
  "reply": "your short message to the visitor",
  "suggest": ["item_id_1", "item_id_2"],
  "intent": "service_booking" | "quote_request" | "national_account" | "general_question" | "unclear",
  "contact_captured": { "name": "...", "phone": "..." } | null
}

"suggest" = item IDs from the menu above that you want to recommend right now. Empty array [] if you're still gathering info or it's not a menu service.
"contact_captured" = only fill this in once the visitor has given you BOTH their name and phone number (for quote/national-account requests). Otherwise null.`;

        async function callCass(history) {
            const body = {
                model: "claude-sonnet-4-5",
                max_tokens: 800,
                system: CASS_SYSTEM_PROMPT,
                messages: history
            };
            const headers = { "Content-Type": "application/json" };
            if (CLAUDE_API_KEY) {
                headers["x-api-key"] = CLAUDE_API_KEY;
                headers["anthropic-version"] = "2023-06-01";
                headers["anthropic-dangerous-direct-browser-access"] = "true";
            }
            try {
                const response = await fetch(CLAUDE_PROXY_URL, {
                    method: "POST",
                    headers,
                    body: JSON.stringify(body)
                });
                if (!response.ok) throw new Error("API " + response.status);
                const data = await response.json();
                const textBlock = data.content.find(b => b.type === 'text');
                let raw = (textBlock ? textBlock.text : '').replace(/```json|```/g, '').trim();
                try { return JSON.parse(raw); }
                catch {
                    return { reply: raw || "Sorry — I glitched. Could you say that again?", suggest: [], intent: "unclear", contact_captured: null };
                }
            } catch (err) {
                console.error("Cass error:", err);
                return {
                    reply: `I'm having trouble connecting right now. You can also call us directly at ${BUSINESS_PHONE} — we'll pick up.`,
                    suggest: [],
                    intent: "unclear",
                    contact_captured: null
                };
            }
        }

        const HVACBookingPage = () => {

          const [activeCategory, setActiveCategory] = useState(null);
          const [cart, setCart] = useState([]);
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [showItemDetails, setShowItemDetails] = useState(null);
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

          // chat state
          const [history, setHistory] = useState([]);
          const [messages, setMessages] = useState([]); // { who: 'ai'|'user', text }
          const [suggested, setSuggested] = useState([]); // array of item IDs
          const [intent, setIntent] = useState(null);
          const [capturedContact, setCapturedContact] = useState(null);
          const [chatLoading, setChatLoading] = useState(false);
          const [chatInput, setChatInput] = useState('');
          const [heroInput, setHeroInput] = useState('');
          const threadRef = useRef(null);

          useEffect(() => {
              if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
          }, [messages, suggested, chatLoading]);

          const addToCart = (item) => {
              setCart(c => [...c, item]);
              if (window.gtag) window.gtag('event', 'add_to_cart', { item_id: item.id, item_name: item.name, value: item.price });
          };
          const removeFromCart = (index) => setCart(cart.filter((_, i) => i !== index));
          const calculateTotal = () => cart.reduce((t, i) => t + i.price, 0);

          const startChat = async (initialMsg) => {
              setMessages([]);
              setSuggested([]);
              setIntent(null);
              setCapturedContact(null);
              setHistory([]);
              setView('chat');
              if (initialMsg) {
                  await sendChatMessage(initialMsg, []);
              } else {
                  setMessages([{ who: 'ai', text: "Hi there — thanks for stopping by Mechanical Temp. What's going on with your system today?" }]);
              }
          };

          const sendChatMessage = async (text, currentHistory) => {
              if (!text.trim() || chatLoading) return;
              const newHistory = [...(currentHistory ?? history), { role: 'user', content: text }];
              setHistory(newHistory);
              setMessages(m => [...m, { who: 'user', text }]);
              setChatInput('');
              setChatLoading(true);

              const result = await callCass(newHistory);

              setHistory(h => [...h, { role: 'assistant', content: JSON.stringify(result) }]);
              setMessages(m => [...m, { who: 'ai', text: result.reply }]);

              // validate suggested IDs against real menu
              const validIds = (result.suggest || []).filter(id => ALL_ITEMS.some(it => it.id === id));
              setSuggested(validIds);
              setIntent(result.intent || 'unclear');
              if (result.contact_captured && result.contact_captured.name && result.contact_captured.phone) {
                  setCapturedContact(result.contact_captured);
                  // fire to Formspree as a lead even before checkout
                  submitLead(result.contact_captured, result.intent, newHistory);
              }
              setChatLoading(false);

              if (window.gtag) window.gtag('event', 'cass_message', { intent: result.intent });
          };

          const submitLead = async (contact, intent, transcriptHistory) => {
              const fd = new FormData();
              fd.append('source', 'cass-chat-lead');
              fd.append('intent', intent || 'unclear');
              fd.append('name', contact.name);
              fd.append('phone', contact.phone);
              fd.append('transcript', transcriptHistory.map(m => `${m.role}: ${typeof m.content === 'string' ? m.content : JSON.stringify(m.content)}`).join('\n\n'));
              try {
                  await fetch(FORMSPREE_ENDPOINT, { method: 'POST', body: fd, headers: { 'Accept': 'application/json' } });
              } catch (e) { console.error('Lead submit failed', e); }
          };

          const handlePlaceOrder = async (e) => {
            e.preventDefault();
            setIsSubmitting(true);
            const formData = new FormData(e.target);
            // attach chat transcript if present
            if (history.length > 0) {
                formData.append('chat_transcript', history.map(m => `${m.role}: ${typeof m.content === 'string' ? m.content : JSON.stringify(m.content)}`).join('\n\n'));
            }
            try {
              const response = await fetch(FORMSPREE_ENDPOINT, {
                method: "POST", body: formData, headers: { 'Accept': 'application/json' }
              });
              if (response.ok) {
                if (window.gtag) window.gtag('event', 'booking_submitted', { value: calculateTotal() });
                setView('confirmed');
                setIsSubmitting(false);
                setCart([]);
                setTimeout(() => setView('hero'), 5000);
              } else {

                setIsSubmitting(false);
              }

          if (view === 'confirmed') {

                  <header className="relative bg-gradient-to-b from-gray-900 via-gray-900 to-slate-900 text-white py-16 px-6 overflow-hidden">
                    <div className="absolute inset-0 opacity-10 bg-cover bg-center" style={{backgroundImage: "url('https://images.squarespace-cdn.com/content/v1/64b8ce7983e67906ccb6616f/ad1eb7df-a94c-4108-a72b-9868d33fb7cf/truck.jpg?format=2500w')"}} />
                    <div className="relative z-10 max-w-2xl mx-auto text-center">
                      <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-sky-500/15 border border-sky-500/30 text-sky-300 text-xs font-semibold uppercase tracking-wider mb-5">
                        <Sparkles size={14} /> Now with instant assistance
                      </div>
                      <h1 className="text-4xl md:text-5xl font-black tracking-tight mb-4 leading-tight">
                        How can we <span className="text-sky-400">help</span> you today?
                      </h1>
                      <p className="text-base md:text-lg text-slate-300 max-w-lg mx-auto mb-8">
                        Tell our digital assistant what's going on — or browse the menu below for instant booking.
                      </p>

                      {/* The big input */}
                      <div className="relative max-w-xl mx-auto mb-4">
                        <input
                          type="text"
                          value={heroInput}
                          onChange={e => setHeroInput(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter' && heroInput.trim()) startChat(heroInput.trim()); }}
                          placeholder="e.g. my furnace won't turn on..."
                          className="w-full pl-5 pr-16 py-4 text-base bg-white/10 backdrop-blur border border-white/20 rounded-2xl text-white placeholder-slate-400 focus:bg-white/15 focus:border-sky-400 outline-none transition"
                        />
                        <button
                          onClick={() => heroInput.trim() && startChat(heroInput.trim())}
                          className="absolute right-2 top-1/2 -translate-y-1/2 bg-sky-500 hover:bg-sky-400 disabled:opacity-40 text-white w-10 h-10 rounded-xl flex items-center justify-center transition"
                          disabled={!heroInput.trim()}
                        >
                          <ArrowRight size={18} />
                        </button>
                      </div>

                      {/* Quick chips */}
                      <div className="flex flex-wrap gap-2 justify-center mb-8">
                        {[
                          { label: 'No heat', msg: "My furnace won't turn on, I have no heat." },
                          { label: 'No cool', msg: 'My AC is running but not cooling.' },
                          { label: 'Need a tune-up', msg: 'I want to schedule a seasonal tune-up.' },
                          { label: 'Commercial quote', msg: "I'm a property manager and need a quote for HVAC service across multiple buildings." }
                        ].map(chip => (
                          <button
                            key={chip.label}
                            onClick={() => startChat(chip.msg)}
                            className="px-3 py-1.5 text-xs font-medium bg-white/8 hover:bg-white/15 border border-white/15 rounded-full transition"
                          >
                            {chip.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  </header>

                  {/* OR divider + menu */}
                  <main className="container mx-auto px-4 py-12 max-w-4xl">
                    <div className="flex items-center gap-4 mb-10 max-w-md mx-auto">
                      <div className="flex-1 h-px bg-slate-300" />
                      <span className="text-xs uppercase tracking-widest font-semibold text-slate-500">Or browse the menu</span>
                      <div className="flex-1 h-px bg-slate-300" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {categories.map((cat) => (
                        <div key={cat.id} onClick={() => { setActiveCategory(cat); setView('category'); }}
                          className={`${cat.color} p-5 rounded-2xl border-2 border-transparent hover:shadow-xl hover:-translate-y-0.5 transition-all cursor-pointer flex items-center gap-5 group`}>
                          <div className="bg-white p-3 rounded-xl shadow-sm group-hover:scale-110 transition-transform">
                            {cat.icon}
                          </div>
                          <div className="flex-1">
                            <h3 className="font-bold text-lg text-slate-900">{cat.title}</h3>
                            <p className="text-sm text-slate-600">{cat.subtitle}</p>
                            <div className="mt-1.5 text-sm font-bold text-sky-600 flex items-center gap-1">View Options <ArrowRight size={14}/></div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </main>
                  <Footer />
                </div>
              )}

              {/* ========== CHAT VIEW ========== */}
              {view === 'chat' && (
                <div className="max-w-2xl mx-auto min-h-screen bg-white">
                  <div className="bg-slate-100 sticky top-[72px] z-40 p-4 border-b border-slate-200">
                    <button onClick={() => setView('hero')} className="flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-slate-900 mb-3 bg-white w-fit px-3 py-1 rounded-full border border-slate-200">
                      <ChevronLeft size={16} /> Back
                    </button>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-bold text-sm">CS</div>
                      <div>
                        <p className="font-bold text-slate-900 leading-tight">Cass</p>
                        <p className="text-xs text-slate-500 flex items-center gap-1.5">
                          <span className="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Digital concierge · responds instantly
                        </p>
                      </div>
                    </div>
                  </div>

                  <div ref={threadRef} className="p-4 pb-6 flex flex-col gap-3 chat-scroll" style={{ minHeight: '50vh' }}>
                    {messages.map((m, i) => (
                      <div key={i} className={`flex gap-2 ${m.who === 'user' ? 'justify-end' : ''}`}>
                        {m.who === 'ai' && (
                          <div className="w-7 h-7 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-bold text-[10px] flex-shrink-0 mt-1">CS</div>
                        )}
                        <div className={`max-w-[80%] px-4 py-2.5 text-sm leading-relaxed ${
                          m.who === 'user'
                            ? 'bg-sky-600 text-white rounded-2xl rounded-br-md'
                            : 'bg-slate-100 text-slate-900 rounded-2xl rounded-bl-md'
                        }`}>{m.text}</div>
                      </div>
                    ))}
                    {chatLoading && (
                      <div className="flex gap-2">
                        <div className="w-7 h-7 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-bold text-[10px] flex-shrink-0 mt-1">CS</div>
                        <div className="bg-slate-100 rounded-2xl rounded-bl-md px-4 py-3 flex gap-1.5">
                          <span className="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                          <span className="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                          <span className="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Suggested service cards */}
                  {suggested.length > 0 && (
                    <div className="px-4 mb-4">
                      <div className="bg-sky-50 border border-sky-200 rounded-xl p-3">
                        <p className="text-[11px] uppercase tracking-widest font-bold text-sky-700 mb-2 flex items-center gap-1.5">
                          <Sparkles size={12}/> Cass suggests
                        </p>
                        <div className="space-y-2">
                          {suggested.map(id => {
                            const it = ALL_ITEMS.find(i => i.id === id);
                            if (!it) return null;
                            return (
                              <div key={id} className="bg-white rounded-lg p-3 flex justify-between items-center gap-3 border border-sky-100">
                                <div className="flex-1 min-w-0">
                                  <p className="font-bold text-sm text-slate-900">{it.name}</p>
                                  <p className="text-xs text-slate-500 mt-0.5 leading-snug">{it.description}</p>
                                </div>
                                <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                                  <span className="font-bold text-sm">${it.price}{it.isSubscription && <span className="text-[10px] text-slate-400 font-normal">/mo</span>}</span>
                                  <button onClick={() => addToCart(it)} className="bg-sky-600 hover:bg-sky-700 text-white text-xs font-bold px-3 py-1 rounded-md">Add</button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Contact captured banner */}
                  {capturedContact && (
                    <div className="px-4 mb-4">
                      <div className="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-2">
                        <Check className="text-green-600 flex-shrink-0" size={18}/>
                        <p className="text-sm text-green-900">Got it — we'll have Brian call <strong>{capturedContact.name}</strong> at {capturedContact.phone} shortly.</p>
                      </div>
                    </div>
                  )}

                  {/* Chat input */}
                  <div className="sticky bottom-0 bg-white border-t border-slate-200 p-3 flex gap-2">
                    <input
                      type="text"
                      value={chatInput}
                      onChange={e => setChatInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') sendChatMessage(chatInput); }}
                      disabled={chatLoading}
                      placeholder="Type a message..."
                      className="flex-1 px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-sky-400 outline-none disabled:opacity-50"
                    />
                    <button
                      onClick={() => sendChatMessage(chatInput)}
                      disabled={!chatInput.trim() || chatLoading}
                      className="bg-sky-600 hover:bg-sky-700 disabled:opacity-40 text-white w-12 h-12 rounded-xl flex items-center justify-center"
                    >
                      <Send size={18}/>
                    </button>
                  </div>
                </div>
              )}

              {/* ========== CATEGORY VIEW ========== */}
              {view === 'category' && activeCategory && (
                <div className="max-w-3xl mx-auto min-h-screen bg-white">
                  <div className={`${activeCategory.color} sticky top-[72px] z-40 p-6 shadow-sm`}>
                    <button onClick={() => setView('hero')} className="flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-slate-900 mb-4 bg-white/50 w-fit px-3 py-1 rounded-full">
                      <ChevronLeft size={16} /> Back to Categories
                    </button>
                    <div className="flex items-center gap-4">
                      <div className="bg-white p-3 rounded-xl shadow-sm">{activeCategory.icon}</div>
                      <div>
                        <h1 className="text-2xl font-bold text-slate-900">{activeCategory.title}</h1>
                        <p className="text-slate-600">{activeCategory.subtitle}</p>
                      </div>
                    </div>
                  </div>
                  <div className="p-6 pb-32">
                    {activeCategory.items.map((item) => (
                      <div key={item.id} className="bg-white border border-slate-100 rounded-xl p-5 shadow-sm mb-4 relative overflow-hidden hover:border-sky-200 transition-colors">
                        {item.popular && <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-[10px] font-bold px-2 py-1 rounded-bl-lg">POPULAR</div>}
                        <div className="flex justify-between items-start mb-2">
                          <h3 className="font-bold text-slate-800 text-lg pr-4">{item.name}</h3>
                          <div className="font-bold text-lg text-slate-900 whitespace-nowrap">${item.price}{item.isSubscription && <span className="text-xs font-normal text-slate-500">/mo</span>}</div>
                        </div>
                        <p className="text-slate-500 text-sm mb-4">{item.description}</p>
                        <div className="flex gap-3">
                          <button onClick={() => setShowItemDetails(item)} className="flex-1 py-2 px-3 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-2">
                            <Info size={16} /> Details
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); addToCart(item); }} className="flex-1 py-2 px-3 rounded-lg bg-sky-600 hover:bg-sky-700 text-white text-sm font-bold shadow-sm flex items-center justify-center gap-2">
                            <Plus size={16} /> Add
                          </button>
                        </div>
                      </div>
                    ))}

                    {/* Ask Cass escape hatch */}
                    <div className="mt-6 bg-sky-50 border border-sky-200 rounded-xl p-4 flex items-center gap-3">
                      <MessageCircle className="text-sky-700 flex-shrink-0" size={22}/>
                      <div className="flex-1">
                        <p className="text-sm font-semibold text-slate-900">Not sure which is right?</p>
                        <p className="text-xs text-slate-600">Cass can help you pick the right service in 30 seconds.</p>
                      </div>
                      <button
                        onClick={() => startChat(`I was looking at your ${activeCategory.title.toLowerCase()} options but I'm not sure which one fits my situation.`)}
                        className="bg-sky-600 hover:bg-sky-700 text-white text-sm font-bold px-4 py-2 rounded-lg whitespace-nowrap"
                      >Ask Cass</button>
                    </div>
                  </div>
                </div>
              )}

              {/* ========== CHECKOUT ========== */}
              {view === 'checkout' && (
                <div className="min-h-screen bg-white">
                  <div className="bg-gray-900 text-white p-4 sticky top-[72px] z-40 flex items-center gap-2 shadow-md">
                    <button onClick={() => setView('hero')} className="p-1 hover:bg-gray-700 rounded-full"><ChevronLeft size={20} /></button>
                    <h2 className="font-bold text-lg">Your Request</h2>
                  </div>
                  <div className="max-w-xl mx-auto p-6 pb-32">
                    {cart.length === 0 ? (
                      <div className="text-center py-20 opacity-50">
                        <ShoppingCart size={48} className="mx-auto mb-4" />
                        <p>Tray is empty.</p>
                        <button onClick={() => setView('hero')} className="text-sky-600 font-bold mt-4 underline">Add Services</button>
                      </div>
                    ) : (
                      <>
                        <div className="space-y-4 mb-8">
                          {cart.map((item, index) => (
                            <div key={index} className="flex justify-between items-center border-b border-slate-100 pb-4">
                              <div>
                                <h4 className="font-bold text-slate-800">{item.name}</h4>
                                <p className="text-xs text-slate-500">{item.description}</p>
                              </div>
                              <div className="flex flex-col items-end gap-2 ml-4">
                                <span className="font-bold">${item.price}</span>
                                <button onClick={() => removeFromCart(index)} className="text-xs text-red-500 hover:text-red-700">Remove</button>
                              </div>
                            </div>
                          ))}
                        </div>
                        <div className="bg-slate-50 p-6 rounded-xl mb-8 border border-slate-200">
                          <div className="flex justify-between items-center text-xl font-bold text-slate-900">
                            <span>Est. Total</span>
                            <span className="text-sky-600">${calculateTotal()}</span>
                          </div>
                          <p className="text-xs text-center text-slate-400 mt-2">Payment collected after service is complete.</p>
                        </div>
                        <form onSubmit={handlePlaceOrder} className="space-y-5">
                          <div className="bg-sky-50 p-4 rounded-lg border border-sky-100 mb-6">
                            <h3 className="font-bold text-sky-900 text-sm">Almost Done!</h3>
                            <p className="text-sm text-sky-700">Enter your details to confirm this appointment.</p>
                          </div>
                          {cart.map((item, i) => <input key={i} type="hidden" name={`Item ${i+1}`} value={`${item.name} - $${item.price}`} />)}
                          <input type="hidden" name="Total" value={`$${calculateTotal()}`} />
                          <input type="hidden" name="source" value="express-booking" />
                          <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                            <input required type="text" name="name" defaultValue={capturedContact?.name || ''} className="w-full bg-white border border-slate-300 rounded-lg p-3 focus:border-sky-500 outline-none" placeholder="John Doe" />
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Phone</label>
                            <input required type="tel" name="phone" defaultValue={capturedContact?.phone || ''} className="w-full bg-white border border-slate-300 rounded-lg p-3 focus:border-sky-500 outline-none" placeholder="(313) 555-0123" />
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Email</label>
                            <input required type="email" name="email" className="w-full bg-white border border-slate-300 rounded-lg p-3 focus:border-sky-500 outline-none" placeholder="john@example.com" />
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Address</label>
                            <input required type="text" name="address" className="w-full bg-white border border-slate-300 rounded-lg p-3 focus:border-sky-500 outline-none" placeholder="123 Main St, Southfield" />
                          </div>
                          <button type="submit" disabled={isSubmitting} className="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2 disabled:opacity-50">
                            {isSubmitting ? "Sending..." : <><span>Confirm Request</span><ArrowRight size={20} /></>}
                          </button>
                        </form>
                      </>
                    )}
                  </div>
                </div>
              )}

              {/* Sticky cart bar */}
              {view !== 'checkout' && cart.length > 0 && (
                <div className="fixed bottom-6 left-6 right-6 z-50 max-w-md mx-auto">
                  <button onClick={() => setView('checkout')} className="w-full bg-gray-900 text-white p-4 rounded-xl shadow-2xl flex justify-between items-center hover:bg-gray-800 transition-colors border border-gray-700">
                    <div className="flex items-center gap-3">
                      <div className="bg-sky-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">{cart.length}</div>
                      <span className="font-bold">Complete Request</span>
                    </div>
                    <span className="font-bold text-lg">${calculateTotal()}</span>
                  </button>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HVACBookingPage />);
    </script>
</body>
</html>
