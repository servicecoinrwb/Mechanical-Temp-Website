<style>
:root{
  --paper:#F6F4EF; --card:#FFFFFF; --ink:#15181E; --ink2:#4A5159; --line:#E4E0D7;
  --chrome:#15181E; --chrome2:#20242C;
  --heat:#E1542A; --cool:#1F76AE; --gold:#C79A2C;
  --tA:#1F76AE; --tB:#2E9183; --tC:#C79A2C; --tD:#D67430; --tE:#BC3826;
  --shadow:0 1px 2px rgba(20,24,30,.06),0 8px 24px rgba(20,24,30,.08);
  --shadow-lg:0 12px 48px rgba(20,24,30,.22);
  --disp:'Oswald','Arial Narrow',sans-serif; --body:'IBM Plex Sans',-apple-system,Segoe UI,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.45;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.disp{font-family:var(--disp);letter-spacing:.01em}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:40;background:var(--chrome);color:#fff;
  padding:env(safe-area-inset-top) 0 0}
.bar{display:flex;align-items:center;gap:12px;padding:12px 16px 12px}
.brand{display:flex;flex-direction:column;line-height:1;flex:1;min-width:0}
.brand .logo{height:30px;width:auto;max-width:210px;object-fit:contain;display:block}
.brand .co{font-family:var(--disp);font-weight:700;font-size:19px;text-transform:uppercase;
  letter-spacing:.04em;white-space:nowrap}
.brand .tg{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9AA3AD;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .tg b{background:linear-gradient(90deg,var(--cool),var(--heat));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700}
.iconbtn{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:#262B34;
  position:relative;transition:.15s;flex:none}
.iconbtn:active{transform:scale(.92);background:#2F3540}
.iconbtn svg{width:21px;height:21px;stroke:#E7EAEE;fill:none;stroke-width:1.8}
.badge{position:absolute;top:-5px;right:-5px;min-width:20px;height:20px;padding:0 5px;border-radius:10px;
  background:var(--heat);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;
  font-family:var(--disp);box-shadow:0 0 0 2px var(--chrome)}
.accent{height:3px;background:linear-gradient(90deg,var(--cool),var(--gold) 55%,var(--heat))}
.modeToggle{display:flex;align-items:center;background:#0E1116;border-radius:11px;padding:3px;gap:2px;flex:none}
.modeToggle span{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.05em;padding:7px 9px;border-radius:8px;color:#8A929C;text-transform:uppercase;display:flex;align-items:center;gap:5px;transition:.15s}
.modeToggle span svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.modeToggle span.on{color:#fff}
.modeToggle span.cu.on{background:var(--cool)}
.modeToggle span.te.on{background:var(--heat)}
.techbar{background:var(--heat);color:#fff;font-size:11.5px;letter-spacing:.02em;text-align:center;
  padding:7px 16px;font-weight:500;display:none}
.techbar b{font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;margin-right:6px}
body.tech .techbar{display:block}
.techdesc{background:#EFEBE2;border:1px solid var(--line);border-left:3px solid var(--heat);border-radius:10px;
  padding:11px 14px;margin:10px 0 2px;font-size:13.5px;color:var(--ink2);line-height:1.45}
.techdesc b{color:var(--ink);font-family:var(--disp);letter-spacing:.03em}
.custnote{font-size:12px;color:#A39B8B;margin-top:4px}

/* ---- auth gate ---- */
#gate{position:fixed;inset:0;z-index:200;background:var(--chrome);display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:28px;color:#fff}
#gate.on{display:flex}
.gatebox{width:min(360px,100%);text-align:center}
.gatebox .logo{height:42px;margin:0 auto 26px;display:block;max-width:240px;object-fit:contain}
.gatebox h2{font-family:var(--disp);font-weight:600;font-size:22px;margin:0 0 4px;text-transform:uppercase;letter-spacing:.03em}
.gatebox p{color:#9AA3AD;font-size:13px;margin:0 0 24px}
.gatefield{text-align:left;margin-bottom:13px}
.gatefield label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9AA3AD;font-weight:700;display:block;margin-bottom:6px}
.gatefield input{width:100%;padding:14px 15px;border-radius:12px;border:1.5px solid #2F3540;background:#1B1F26;
  color:#fff;font-size:16px;outline:none}
.gatefield input:focus{border-color:var(--cool)}
.gatebtn{width:100%;padding:15px;border-radius:13px;background:linear-gradient(135deg,var(--cool),var(--heat));
  color:#fff;font-weight:700;font-size:15.5px;margin-top:8px;letter-spacing:.02em}
.gatebtn:disabled{opacity:.55}
.gatemsg{min-height:20px;font-size:13px;margin-top:14px;color:#E1542A}
.gateboot{color:#9AA3AD;font-size:13px}

/* ---- user chip + sync pill ---- */
.userchip{display:flex;align-items:center;gap:7px;background:#262B34;border-radius:11px;padding:7px 11px;flex:none}
.userchip .av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--cool),var(--heat));
  display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:12px;color:#fff}
.userchip .nm{font-size:12.5px;font-weight:600;color:#E7EAEE;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.syncpill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#8A929C;padding:4px 0}
.syncpill .d{width:8px;height:8px;border-radius:50%;background:#8A929C}
.syncpill.ok .d{background:#1F8A52}.syncpill.ok{color:#1F8A52}
.syncpill.saving .d{background:var(--gold);animation:pulse 1s infinite}.syncpill.saving{color:var(--gold)}
.syncpill.off .d{background:var(--heat)}.syncpill.off{color:var(--heat)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ---- history list ---- */
.histitem{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);width:100%;text-align:left;display:flex;gap:12px;align-items:center}
.histitem:active{transform:scale(.99)}
.histitem .hl{flex:1;min-width:0}
.histitem .hn{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.histitem .hm{font-size:12px;color:var(--ink2);margin-top:3px}
.histitem .hr{text-align:right;flex:none}
.histitem .ht{font-family:var(--disp);font-weight:700;font-size:17px}
.statuspill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:7px;font-family:var(--disp)}
.st-draft{background:#ECE8DF;color:#7A6E62}
.st-presented{background:#D9E8F2;color:#1F76AE}
.st-won{background:#D7EFE0;color:#1F8A52}
.st-lost{background:#F2DEDA;color:#BC3826}
.statusrow{display:flex;gap:6px;margin:14px 0 4px}
.statusrow button{flex:1;padding:9px 4px;border-radius:9px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:var(--disp);border:1.5px solid var(--line);background:#fff;color:var(--ink2)}
.statusrow button.on.s-draft{background:#7A6E62;color:#fff;border-color:#7A6E62}
.statusrow button.on.s-presented{background:var(--cool);color:#fff;border-color:var(--cool)}
.statusrow button.on.s-won{background:#1F8A52;color:#fff;border-color:#1F8A52}
.statusrow button.on.s-lost{background:var(--heat);color:#fff;border-color:var(--heat)}
.newq{width:100%;padding:13px;border-radius:12px;background:#ECE8DF;color:var(--ink2);font-weight:600;font-size:13.5px;margin-bottom:14px}

/* ---- photos ---- */
.photosec{margin:16px 0 4px}
.photosec h5{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);font-weight:700;margin:0 0 10px}
.photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photocell{position:relative;aspect-ratio:1;border-radius:11px;overflow:hidden;background:#ECE8DF;border:1px solid var(--line)}
.photocell img{width:100%;height:100%;object-fit:cover;display:block}
.photocell .px{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(21,24,30,.7);
  display:grid;place-items:center}
.photocell .px svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none}
.photocell.up{display:grid;place-items:center}
.photocell.up .ld{width:22px;height:22px;border:2.5px solid #C3BDB0;border-top-color:var(--cool);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.addphoto{aspect-ratio:1;border-radius:11px;border:1.5px dashed #C3BDB0;background:#F4F1EA;display:grid;place-items:center;
  color:var(--ink2);transition:.12s}
.addphoto:active{transform:scale(.96);background:#ECE8DF}
.addphoto svg{width:26px;height:26px;stroke:var(--ink2);stroke-width:1.8;fill:none}
.photonote{font-size:11.5px;color:#A39B8B;margin-top:9px;display:flex;align-items:center;gap:6px}
.photoOnPdf{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:13px;color:var(--ink2);cursor:pointer}

/* ---- signature ---- */
.sigsec{margin:16px 0 4px}
.sigsec h5{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);font-weight:700;margin:0 0 10px}
.sigpad{position:relative;background:#fff;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;touch-action:none}
.sigpad canvas{display:block;width:100%;height:160px}
.sigpad .base{position:absolute;left:14px;right:14px;bottom:34px;border-bottom:1.5px dashed #C3BDB0;pointer-events:none}
.sigpad .xmark{position:absolute;left:16px;bottom:36px;font-family:var(--disp);color:#C3BDB0;font-size:18px;pointer-events:none}
.sigpad .hint{position:absolute;left:0;right:0;bottom:11px;text-align:center;font-size:11.5px;color:#A39B8B;pointer-events:none}
.sigrow{display:flex;gap:8px;margin-top:9px}
.sigrow button{flex:1;padding:11px;border-radius:10px;font-weight:600;font-size:13px}
.sigrow .clr2{background:#ECE8DF;color:var(--ink2)}
.sigrow .acc{background:#1F8A52;color:#fff;display:flex;align-items:center;justify-content:center;gap:7px}
.sigrow .acc svg{width:16px;height:16px;stroke:#fff;stroke-width:2.4;fill:none}
.signed{background:#D7EFE0;border:1px solid #1F8A52;border-radius:12px;padding:14px;display:flex;align-items:center;gap:13px}
.signed img{height:46px;width:auto;max-width:160px;object-fit:contain;background:#fff;border-radius:6px;padding:3px}
.signed .si{flex:1;min-width:0}
.signed .si b{display:block;font-size:14px}
.signed .si small{color:var(--ink2);font-size:12px}
.signed .redo{color:var(--heat);font-weight:600;font-size:12px;flex:none}
.signfield{margin-bottom:10px}
.signfield input{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;outline:none;background:#fff}
.signfield input:focus{border-color:var(--cool)}

/* search */
.searchwrap{padding:12px 16px;background:var(--chrome2);position:sticky;top:0;z-index:30}
.search{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:11px 14px}
.search svg{width:18px;height:18px;stroke:#8A929C;fill:none;stroke-width:2;flex:none}
.search input{border:none;outline:none;flex:1;font-size:15px;color:var(--ink);background:none}
.search .clr{font-size:13px;color:var(--cool);font-weight:600;padding:4px 6px;display:none}

/* segmented */
.seg{display:flex;gap:6px;padding:14px 16px 6px}
.seg button{flex:1;padding:10px;border-radius:11px;background:#ECE8DF;color:var(--ink2);
  font-weight:600;font-size:14px;transition:.15s;border:1.5px solid transparent}
.seg button.on{background:var(--chrome);color:#fff}
.seg .n{font-family:var(--disp);font-size:12px;opacity:.6;margin-left:5px}

/* layout */
main{max-width:900px;margin:0 auto;padding:6px 16px 120px}
.crumb{display:flex;align-items:center;gap:8px;padding:14px 2px 10px;font-size:13px;color:var(--ink2);flex-wrap:wrap}
.crumb button{color:var(--cool);font-weight:600}
.crumb .sep{color:#C3BDB0}
.h-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--heat);font-weight:700}
.h-title{font-family:var(--disp);font-weight:600;font-size:27px;line-height:1.05;margin:5px 0 2px}
.h-sub{color:var(--ink2);font-size:14px;margin-bottom:6px}

/* category / task rows */
.list{display:flex;flex-direction:column;gap:9px;margin-top:8px}
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);transition:.12s;text-align:left;width:100%}
.row:active{transform:scale(.985);border-color:#CFC8BA}
.row .tag{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.05em;color:#fff;
  background:var(--chrome);padding:6px 9px;border-radius:8px;flex:none;min-width:46px;text-align:center}
.row.equip .tag{background:linear-gradient(135deg,var(--cool),var(--heat))}
.row .mid{flex:1;min-width:0;overflow:hidden}
.row .nm{font-weight:600;font-size:15.5px;line-height:1.25;overflow-wrap:anywhere}
.row .meta{font-size:12.5px;color:var(--ink2);margin-top:3px}
.row .chev{stroke:#B7AF9F;stroke-width:2;fill:none;width:20px;height:20px;flex:none}
.row .from{text-align:right;flex:none}
.row .from .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#A39B8B}
.row .from .v{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--ink)}

/* options (good/better/best) */
.opts{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.opt{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow);position:relative}
.opt.rec{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),var(--shadow)}
.opt .top{display:flex;align-items:flex-start;gap:13px;padding:16px 17px 12px}
.tier{width:54px;flex:none;text-align:center}
.tier .dot{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin:0 auto;
  font-family:var(--disp);font-weight:700;font-size:22px;color:#fff}
.tier .lab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-top:6px;color:var(--ink2)}
.opt .head{flex:1;min-width:0}
.opt .onm{font-weight:600;font-size:15px;line-height:1.25}
.opt .ocode{font-family:var(--disp);font-size:11.5px;letter-spacing:.08em;color:#A39B8B;margin-top:3px}
.opt .price{text-align:right;flex:none}
.opt .price .amt{font-family:var(--disp);font-weight:700;font-size:30px;line-height:.95}
.opt .price .ea{font-size:10.5px;color:#A39B8B;letter-spacing:.06em}
.recflag{position:absolute;top:0;right:0;background:var(--gold);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-bottom-left-radius:11px;font-family:var(--disp)}
.opt .feats{padding:2px 17px 4px;display:flex;flex-direction:column;gap:7px}
.feat{display:flex;gap:9px;font-size:13.5px;color:var(--ink2);line-height:1.35}
.feat svg{width:15px;height:15px;flex:none;margin-top:2px;stroke:var(--tC);stroke-width:2.4;fill:none}
.opt .act{padding:13px 17px 16px}
.addbtn{width:100%;padding:13px;border-radius:12px;background:var(--chrome);color:#fff;font-weight:600;
  font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.12s}
.addbtn:active{transform:scale(.98)}
.addbtn.added{background:#1F8A52}
.addbtn svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none}

.empty{text-align:center;padding:64px 20px;color:var(--ink2)}
.empty .big{font-family:var(--disp);font-size:21px;color:var(--ink);margin-bottom:6px}

/* drawers */
.scrim{position:fixed;inset:0;background:rgba(15,18,23,.5);z-index:50;opacity:0;visibility:hidden;
  transition:.22s;backdrop-filter:blur(2px)}
.scrim.on{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--paper);z-index:60;
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg)}
.drawer.on{transform:translateX(0)}
.dhead{background:var(--chrome);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;
  display:flex;align-items:center;gap:12px}
.dhead .t{flex:1;font-family:var(--disp);font-weight:600;font-size:20px;text-transform:uppercase;letter-spacing:.03em}
.dhead .x{width:38px;height:38px;border-radius:10px;background:#262B34;display:grid;place-items:center}
.dhead .x svg{width:20px;height:20px;stroke:#fff;stroke-width:2;fill:none}
.dbody{flex:1;overflow-y:auto;padding:18px;-webkit-overflow-scrolling:touch}

/* quote */
.cust{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:16px}
.cust label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);font-weight:700}
.cust input{width:100%;border:none;border-bottom:1.5px solid var(--line);padding:7px 0;font-size:16px;outline:none;
  background:none;margin-bottom:10px}
.cust input:focus{border-color:var(--cool)}
.cust input:last-child{margin-bottom:0}
.qitem{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;
  box-shadow:var(--shadow)}
.qitem .qt{display:flex;gap:10px;align-items:flex-start}
.qitem .badge2{font-family:var(--disp);font-weight:700;font-size:13px;color:#fff;border-radius:7px;
  width:30px;height:30px;display:grid;place-items:center;flex:none}
.qitem .qn{flex:1;min-width:0;font-weight:600;font-size:14px;line-height:1.25}
.qitem .qc{font-family:var(--disp);font-size:11px;color:#A39B8B;letter-spacing:.06em}
.qitem .del{color:#C0392B;font-size:12px;font-weight:600;padding:3px 4px}
.qitem .qb{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.qty{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:9px;overflow:hidden}
.qty button{width:32px;height:32px;font-size:18px;font-weight:600;color:var(--cool);background:#F4F1EA}
.qty span{width:34px;text-align:center;font-family:var(--disp);font-weight:600;font-size:15px}
.qprice{font-family:var(--disp);font-weight:700;font-size:18px}
.qprice input{width:90px;text-align:right;font-family:var(--disp);font-weight:700;font-size:17px;border:none;
  border-bottom:1.5px dashed var(--cool);outline:none;background:none;color:var(--ink)}
.totals{background:var(--chrome);color:#fff;border-radius:14px;padding:16px;margin-top:6px}
.totals .tr{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:#C7CDD4}
.totals .tr.g{border-top:1px solid #333A44;margin-top:7px;padding-top:12px;color:#fff;font-size:16px;align-items:baseline}
.totals .tr.g .gv{font-family:var(--disp);font-weight:700;font-size:30px}
.taxrow{display:flex;align-items:center;gap:9px;color:#C7CDD4;font-size:13px;margin:9px 0 2px;cursor:pointer}
.sw{width:42px;height:24px;border-radius:13px;background:#3A414B;position:relative;transition:.18s;flex:none}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s}
.sw.on{background:var(--heat)}.sw.on::after{transform:translateX(18px)}
.printbtn{width:100%;margin-top:14px;padding:15px;border-radius:13px;background:linear-gradient(135deg,var(--cool),var(--heat));
  color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:.02em}
.printbtn svg{width:19px;height:19px;stroke:#fff;stroke-width:2;fill:none}
.clearq{width:100%;margin-top:9px;padding:11px;color:#C0392B;font-weight:600;font-size:13px}

/* settings */
.set{margin-bottom:18px}
.set h4{font-family:var(--disp);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);
  margin:0 0 11px;font-weight:600}
.field{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;margin-bottom:9px}
.field .fl{font-size:14px;font-weight:500}.field .fl small{display:block;color:#A39B8B;font-size:11.5px;font-weight:400;margin-top:1px}
.field .fi{display:flex;align-items:center;gap:5px}
.field input{width:74px;text-align:right;font-family:var(--disp);font-weight:600;font-size:18px;border:none;
  border-bottom:2px solid var(--gold);outline:none;background:none;color:var(--ink)}
.field .u{color:#A39B8B;font-size:14px;font-weight:600}
.tiergrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.tiercell{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 4px;text-align:center}
.tiercell .td{width:26px;height:26px;border-radius:7px;margin:0 auto 7px;color:#fff;font-family:var(--disp);
  font-weight:700;font-size:13px;display:grid;place-items:center}
.tiercell input{width:100%;text-align:center;font-family:var(--disp);font-weight:600;font-size:15px;border:none;
  border-bottom:2px solid var(--gold);outline:none;background:none}
.reset{width:100%;margin-top:6px;padding:12px;border-radius:11px;background:#ECE8DF;color:var(--ink2);font-weight:600;font-size:13px}
.note{font-size:12px;color:#A39B8B;margin-top:14px;line-height:1.5;border-top:1px solid var(--line);padding-top:14px}
.pencil{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:7px;background:#ECE8DF;vertical-align:middle;margin-left:8px;transition:.12s}
.pencil:active{transform:scale(.9)}
.pencil svg{width:14px;height:14px;stroke:var(--ink2);stroke-width:2;fill:none}
.opt .onm .pencil{margin-left:6px}
.editbox{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 0}
.editbox input{flex:1;min-width:150px;font-family:var(--body);font-size:15px;font-weight:600;color:var(--ink);border:none;border-bottom:2px solid var(--cool);outline:none;background:#fff;padding:5px 4px;border-radius:6px 6px 0 0}
.editbox .ok,.editbox .no{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.editbox .ok{background:#1F8A52}.editbox .no{background:#ECE8DF}
.editbox .ok svg{stroke:#fff}.editbox .no svg{stroke:var(--ink2)}
.editbox svg{width:17px;height:17px;stroke-width:2.4;fill:none}
.h-title .editbox input{font-family:var(--disp);font-size:24px}

@media(min-width:680px){
  .list{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .h-title{font-size:32px}
}

/* print */
#print{display:none}
@media print{
  body *{visibility:hidden}
  #print,#print *{visibility:visible}
  #print{display:block;position:absolute;inset:0;padding:0;background:#fff;color:#000;font-family:var(--body)}
  @page{margin:14mm}
}
#print{padding:0;background:#fff;color:#111}
.pwrap{max-width:760px;margin:0 auto}
.phead{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #15181E;padding-bottom:12px;margin-bottom:6px}
.phead .pco{font-family:var(--disp);font-weight:700;font-size:26px;text-transform:uppercase}
.phead .pmeta{font-size:12px;color:#555;text-align:right;line-height:1.6}
.pquote{font-family:var(--disp);text-transform:uppercase;letter-spacing:.2em;font-size:13px;color:#E1542A;font-weight:600;margin:14px 0 4px}
.pcust{font-size:14px;margin-bottom:16px;line-height:1.7}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{text-align:left;border-bottom:2px solid #15181E;padding:8px 6px;font-family:var(--disp);text-transform:uppercase;letter-spacing:.05em;font-size:12px}
.ptable td{padding:9px 6px;border-bottom:1px solid #ddd;vertical-align:top}
.ptable .r{text-align:right;font-family:var(--disp);font-weight:600}
.ptotals{margin-top:14px;margin-left:auto;width:280px;font-size:14px}
.ptotals .pr{display:flex;justify-content:space-between;padding:5px 0}
.ptotals .pr.g{border-top:2px solid #15181E;margin-top:6px;padding-top:10px;font-family:var(--disp);font-weight:700;font-size:20px}
.pfoot{margin-top:30px;font-size:11px;color:#777;border-top:1px solid #ddd;padding-top:12px;line-height:1.6}
</style>
</head>

const famByCode={}; DATA.fams.forEach(f=>famByCode[f.code]=f);
const conceptByFam={}; DATA.concepts.forEach(c=>conceptByFam[c.f]=c);
const optByCode={}; DATA.concepts.forEach(c=>c.opts.forEach(o=>optByCode[o.code]={o,fam:c.f}));
let view={mode:'repair',screen:'home',bucket:null,fam:null};

function catName(fc){return nameOverrides['fam:'+fc]||famByCode[fc].nice;}
function optName(o){return nameOverrides['opt:'+o.code]||o.nm2;}
/* tech-mode display */
function dispCat(fc){return techMode?conceptByFam[fc].tech.name:catName(fc);}
function dispOpt(o,fam){if(techMode){const eq=famByCode[fam].type==='HVAC Equipment';return (eq?DATA.techTierEq:DATA.techTierSvc)[o.t];}return optName(o);}
function toggleTech(){techMode=!techMode;document.body.classList.toggle('tech',techMode);
  const t=document.getElementById('modeToggle');t.querySelector('.cu').classList.toggle('on',!techMode);t.querySelector('.te').classList.toggle('on',techMode);
  editing=null;save();render();}

function save(){try{localStorage.setItem('mt_field2',JSON.stringify({S,MULT,CART,CUST,taxOn,nameOverrides,techMode}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('mt_field2'));if(d){S=Object.assign(S,d.S);MULT=Object.assign(MULT,d.MULT);CART=d.CART||[];CUST=d.CUST||CUST;taxOn=d.taxOn!==false;nameOverrides=d.nameOverrides||{};techMode=!!d.techMode;}}catch(e){}}

/* ---------- pricing ---------- */
function priceFor(fc,t){const f=famByCode[fc],m=MULT[t]||1;return Math.max(Math.round(f.hrs*m*S.rate+f.matl*m*(1+S.markup)),S.min);}
const money=n=>'$'+Math.round(n).toLocaleString('en-US');
function famLow(fc){return Math.min(...conceptByFam[fc].opts.map(o=>priceFor(fc,o.t)));}
function famHigh(fc){return Math.max(...conceptByFam[fc].opts.map(o=>priceFor(fc,o.t)));}

/* ---------- editable names ---------- */
function svgChev(){return '<svg class="chev" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>';}
function editable(kind,id,text){
  if(editing&&editing.k===kind&&editing.id===id){
    return `<span class="editbox"><input id="editInput" value="${esc(text)}">`+
      `<button class="ok" onclick="commitEdit()"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></button>`+
      `<button class="no" onclick="cancelEdit()"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></span>`;
  }
  return `${esc(text)}<button class="pencil" onclick="startEdit('${kind}','${id}')" aria-label="Rename"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>`;
}
function startEdit(k,id){editing={k,id};render();}
function cancelEdit(){editing=null;render();}
function commitEdit(){const el=document.getElementById('editInput');if(!el){editing=null;return;}
  const v=el.value.trim(),key=editing.k+':'+editing.id;
  if(v)nameOverrides[key]=v; else delete nameOverrides[key];
  editing=null;save();render();}

/* ---------- router ---------- */
const main=document.getElementById('main');
function render(){
  if(view.search){renderSearch();}
  else if(view.screen==='home') view.mode==='repair'?renderBuckets():renderInstalls();
  else if(view.screen==='bucket') renderBucket();
  else if(view.screen==='options') renderOptions();
  if(editing){const el=document.getElementById('editInput');if(el){el.focus();el.select();
    el.onkeydown=e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')cancelEdit();};}}
}

}

function renderSearch(){
  const term=view.search.toLowerCase(), hits=[];
  for(const c of DATA.concepts){
    for(const o of c.opts){
      const hay=(o.code+' '+o.real+' '+optName(o)+' '+o.nm2+' '+catName(c.f)+' '+c.tech.name+' '+c.tech.desc+' '+o.b.join(' ')).toLowerCase();
      if(hay.includes(term))hits.push({c,o});
    }
  }
  main.innerHTML=`
   <div class="crumb"><button onclick="clearSearch()">Guide</button><span class="sep">/</span><span>Search "${esc(view.search)}"</span></div>
   <div class="h-title">${hits.length} result${hits.length!==1?'s':''}</div>

   ${hits.length===0?'<div class="empty"><div class="big">No matches</div>Try a symptom (e.g. "no heat"), a part (e.g. "capacitor"), or a code.</div>':
   `<div class="list">${hits.slice(0,80).map(({c,o})=>`
     <button class="row ${c.type==='HVAC Equipment'?'equip':''}" onclick="clearSearch();openFam('${c.f}')">

       <span class="mid"><span class="nm">${esc(dispOpt(o,c.f))}</span><span class="meta">${esc(dispCat(c.f))} · ${DATA.tierLabel[o.t]} · ${money(priceFor(c.f,o.t))}</span></span>
       ${svgChev()}
     </button>`).join('')}</div>`}`;
}

function addToCart(code,btn){
  if(CART.find(c=>c.code===code))CART=CART.filter(c=>c.code!==code);
  else{const m=optByCode[code];CART.push({code,fam:m.fam,tier:m.o.t,qty:1,override:null});}
  save();scheduleSave();updateBadge();render();
}
function updateBadge(){const n=CART.reduce((s,c)=>s+c.qty,0),b=document.getElementById('cartBadge');b.textContent=n;b.style.display=n?'grid':'none';}
function linePrice(c){return c.override!=null?c.override:priceFor(c.fam,c.tier);}
function subtotal(){return CART.reduce((s,c)=>s+linePrice(c)*c.qty,0);}
function editCust(k,v){CUST[k]=v;save();scheduleSave();}

function exportConfig(){
  const payload={app:'MT_FlatRate_FieldBook',version:1,exported:new Date().toISOString(),
    settings:S,tierMult:MULT,nameOverrides:nameOverrides};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='MT_FieldBook_settings_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  const n=Object.keys(nameOverrides).length;
  ioMsgSet('Exported — '+n+' custom name'+(n===1?'':'s')+' + your rates. Check your downloads.');
}
function importConfig(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.settings)S=Object.assign({},DATA.settings,d.settings);
    if(d.tierMult)MULT=Object.assign({},DATA.tierMult,d.tierMult);
    if(d.nameOverrides)nameOverrides=d.nameOverrides;
    save();renderSettings();render();
    const n=Object.keys(nameOverrides||{}).length;
    ioMsgSet('Imported '+n+' custom name'+(n===1?'':'s')+' + rates ✓');
  }catch(err){ioMsgSet('Could not read that file — make sure it is an exported settings .json',true);}
  };
  r.readAsText(file); input.value='';
}
function ioMsgSet(t,err){const el=document.getElementById('ioMsg');if(el){el.textContent=t;el.style.color=err?'#C0392B':'#1F8A52';}}
function setS(k,v,int){S[k]=int?Math.round(+v):+v;save();render();renderSettings();if(document.getElementById('drawerQ').classList.contains('on'))renderQuote();}
function setSStr(k,v){S[k]=v.trim();save();}
function setMult(t,v){MULT[t]=+v;save();render();renderSettings();}

const LOGO_WH=[1788,503];   // dark logo intrinsic px (for aspect ratio)

function buildPdf(){
  if(!window.jspdf||!window.jspdf.jsPDF){return null;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'letter'});           // 216 x 279mm
  const W=216, M=16, d=new Date().toLocaleDateString('en-US');
  let y=M;
  // logo (dark) top-left
  if(DARK_LOGO.indexOf('data:')===0){
    const lw=52, lh=lw*LOGO_WH[1]/LOGO_WH[0];
    try{doc.addImage(DARK_LOGO,'PNG',M,y,lw,lh);}catch(e){}
    y+=lh+1;
  }else{
    doc.setFont('helvetica','bold');doc.setFontSize(20);doc.text('MECHANICAL TEMP LLC',M,y+6);y+=10;
  }
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(90);
  doc.text('23093 Telegraph Rd, Southfield MI  ·  313-282-4758  ·  mechanicaltemp.com',M,y+3);
  // date top-right
  doc.setFontSize(8.5);doc.setTextColor(120);doc.text('QUOTE DATE',W-M,M+2,{align:'right'});
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(20);doc.text(d,W-M,M+7,{align:'right'});
  y+=8;
  // rule
  doc.setDrawColor(21,24,30);doc.setLineWidth(0.8);doc.line(M,y,W-M,y);y+=8;
  // SERVICE QUOTE label
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(225,84,42);
  doc.text('SERVICE QUOTE',M,y);y+=7;
  // customer block
  doc.setTextColor(20);doc.setFontSize(12);doc.setFont('helvetica','bold');
  doc.text(CUST.name||'—',M,y);y+=5;
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(70);
  const cl=[];if(CUST.addr)cl.push(CUST.addr);if(CUST.email)cl.push(CUST.email);if(CUST.job)cl.push('Job/PO: '+CUST.job);
  cl.forEach(line=>{doc.text(line,M,y);y+=5;});
  y+=3;
  // table
  const sub=subtotal(),tax=taxOn?sub*S.tax:0;
  const body=CART.map(c=>{const o=optByCode[c.code].o;
    return [o.real,
            {content:optName(o)+'\n'+DATA.tierLabel[c.tier]+' · '+catName(c.fam),styles:{}},
            String(c.qty), money(linePrice(c)), money(linePrice(c)*c.qty)];});
  doc.autoTable({
    startY:y, margin:{left:M,right:M},
    head:[['Code','Option','Qty','Price','Amount']],
    body:body,
    theme:'plain',
    styles:{font:'helvetica',fontSize:9.5,cellPadding:{top:2.4,bottom:2.4,left:1.5,right:1.5},textColor:30,lineColor:[221,221,221],lineWidth:{bottom:0.2}},
    headStyles:{fontStyle:'bold',fontSize:8,textColor:20,lineColor:[21,24,30],lineWidth:{bottom:0.6},halign:'left'},
    columnStyles:{0:{cellWidth:20,textColor:90},1:{cellWidth:'auto'},2:{cellWidth:14,halign:'right'},3:{cellWidth:24,halign:'right',fontStyle:'bold'},4:{cellWidth:24,halign:'right',fontStyle:'bold'}},
    didParseCell:function(h){ if(h.section==='body'&&h.column.index===1){ /* two-line: bold name, grey sub handled via newline */ } }
  });
  let ty=doc.lastAutoTable.finalY+8;
  // totals (right aligned block)
  const tx=W-M-60, tv=W-M;
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60);
  doc.text('Subtotal',tx,ty);doc.text(money(sub),tv,ty,{align:'right'});ty+=6;
  if(taxOn){doc.text('Tax ('+(S.tax*100).toFixed(1)+'%)',tx,ty);doc.text(money(tax),tv,ty,{align:'right'});ty+=6;}
  doc.setDrawColor(21,24,30);doc.setLineWidth(0.6);doc.line(tx,ty-2,tv,ty-2);ty+=2;
  doc.setFont('helvetica','bold');doc.setFontSize(15);doc.setTextColor(20);
  doc.text('Total',tx,ty+2);doc.text(money(sub+tax),tv,ty+2,{align:'right'});
  // signature block (if signed)
  if(SIG&&SIG.dataUrl){
    let sy=ty+16;
    if(sy>238)sy=238;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(31,138,82);
    doc.text('APPROVED & ACCEPTED',M,sy);
    try{
      const pr=doc.getImageProperties(SIG.dataUrl);const ar=pr.width/pr.height;
      let sh=18, sw=sh*ar; if(sw>70){sw=70;sh=sw/ar;}
      doc.addImage(SIG.dataUrl,'PNG',M,sy+3,sw,sh);
      doc.setDrawColor(120);doc.setLineWidth(0.3);doc.line(M,sy+3+sh+1,M+72,sy+3+sh+1);
    }catch(e){}
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(70);
    doc.text((SIG.name||'')+(SIG.at?'   ·   '+new Date(SIG.at).toLocaleDateString('en-US'):''),M,sy+30);
  }
  // footer
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(120);
  const fy=270;
  doc.setDrawColor(221);doc.setLineWidth(0.3);doc.line(M,fy-5,W-M,fy-5);
  doc.text('Prices include parts and labor. Quote valid 30 days. Thank you for choosing Mechanical Temp.',M,fy);
  // ---- photos page(s) ----
  const pics=(photosOnPdf?PHOTOS:[]).filter(p=>p.dataUrl&&!p.uploading);
  if(pics.length){
    doc.addPage();
    let py=M;
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(225,84,42);
    doc.text('JOB PHOTOS',M,py);py+=7;
    doc.setDrawColor(21,24,30);doc.setLineWidth(0.6);doc.line(M,py,W-M,py);py+=6;
    const colW=(W-2*M-6)/2;        // 2 columns
    const cellH=colW*0.75+4;       // 4:3 area
    let col=0;
    for(const p of pics){
      if(py+cellH>262){doc.addPage();py=M;}
      const x=M+col*(colW+6);
      try{
        // fit image into colW x (cellH-4) keeping aspect
        const props=doc.getImageProperties(p.dataUrl);
        const ar=props.width/props.height;
        let iw=colW, ih=iw/ar, maxH=cellH-4;
        if(ih>maxH){ih=maxH;iw=ih*ar;}
        const ox=x+(colW-iw)/2;
        doc.addImage(p.dataUrl,'JPEG',ox,py,iw,ih);
      }catch(e){}
      col++;
      if(col===2){col=0;py+=cellH;}
    }
  }
  const safe=(CUST.name||'Quote').replace(/[^a-z0-9]+/gi,'_').slice(0,40);
  const fname='MT_Quote_'+safe+'_'+new Date().toISOString().slice(0,10)+'.pdf';
  return {doc,blob:doc.output('blob'),fname,sub,tax};
}
function downloadPdf(){
  if(!CART.length){alert('Add at least one option first.');return;}
  const p=buildPdf();
  if(!p){alert('PDF engine still loading — try again in a moment.');return;}
  p.doc.save(p.fname);
  if(QSTATUS==='draft')setStatus('presented');
}
async function sendQuote(){
  if(!CART.length){alert('Add at least one option first.');return;}
  const p=buildPdf();
  if(!p){alert('PDF engine still loading — try again in a moment.');return;}
  const office=(S.officeEmail||'office@mechanicaltemp.com').trim();
  const subject='Service Quote from Mechanical Temp'+(CUST.name?' — '+CUST.name:'');
  const bodyLines=['Hi'+(CUST.name?' '+CUST.name:'')+',','',
    'Please find your service quote attached.','',
    'Total: '+money(p.sub+p.tax),'',
    'Questions? Call us at 313-282-4758.','','Thank you,','Mechanical Temp LLC'];
  const body=bodyLines.join('\n');
  const file=new File([p.blob],p.fname,{type:'application/pdf'});
  // Best path: native share sheet WITH the PDF attached (mobile)
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:subject,text:body});
      if(QSTATUS==='draft')setStatus('presented');
      return;
    }catch(e){ if(e&&e.name==='AbortError')return; }
  }
  // Fallback: download the PDF, then open a prefilled email (attach the downloaded file)
  p.doc.save(p.fname);
  const to=encodeURIComponent(CUST.email||'');
  const cc=encodeURIComponent(office);
  const mailto=`mailto:${to}?cc=${cc}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body+'\n\n(Attach the PDF that just downloaded: '+p.fname+')')}`;
  if(QSTATUS==='draft')setStatus('presented');
  setTimeout(()=>{window.location.href=mailto;},400);
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

   AUTH + SYNC + HISTORY
   ============================================================ */
const gate=document.getElementById('gate');
function showGateForm(){document.getElementById('gateBoot').style.display='none';document.getElementById('gateForm').style.display='block';setTimeout(()=>document.getElementById('gateEmail').focus(),50);}
function gateMsg(t){document.getElementById('gateMsg').textContent=t||'';}

async function bootAuth(){
  gate.classList.add('on');
  if(!SB){ // no client (offline / CDN blocked) — fall back to local-only mode
    document.getElementById('gateBoot').textContent='Offline mode — working on this device';
    setTimeout(()=>{gate.classList.remove('on');initApp();},900);return;
  }
  try{
    const {data:{session}}=await SB.auth.getSession();
    if(session&&session.user){onSignedIn(session.user);}
    else{showGateForm();}
  }catch(e){showGateForm();gateMsg('Could not reach server — check signal.');}
  SB.auth.onAuthStateChange((_e,s)=>{ if(s&&s.user&&!USER){onSignedIn(s.user);} });
}
async function doLogin(){
  const email=document.getElementById('gateEmail').value.trim();
  const pass=document.getElementById('gatePass').value;
  if(!email||!pass){gateMsg('Enter email and password.');return;}
  const btn=document.getElementById('gateBtn');btn.disabled=true;btn.textContent='Signing in…';gateMsg('');
  try{
    const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    onSignedIn(data.user);
  }catch(e){gateMsg(e.message||'Sign-in failed.');btn.disabled=false;btn.textContent='Sign In';}
}
async function onSignedIn(user){
  USER=user;
  // display name from profile (fallback to email)
  let name=user.email;
  try{const {data}=await SB.from('profiles').select('full_name').eq('id',user.id).single();if(data&&data.full_name)name=data.full_name;}catch(e){}
  const chip=document.getElementById('userChip');
  document.getElementById('userName').textContent=name;
  document.getElementById('userAv').textContent=(name||'?').trim()[0].toUpperCase();
  chip.style.visibility='visible';
  gate.classList.remove('on');
  initApp();
}
async function doLogout(){
  if(saveTimer){clearTimeout(saveTimer);}
  try{await SB.auth.signOut();}catch(e){}
  location.reload();
}
const enterPass=e=>{if(e.key==='Enter')doLogin();};

/* ---- autosave ---- */
function setSync(s){syncState=s;}
function scheduleSave(){
  if(!SB||!USER)return;            // local-only mode: localStorage already covers it
  if(!CART.length){return;}
  setSync('saving');renderSyncPill();
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(syncQuote,800);
}
async function syncQuote(){
  if(!SB||!USER||!CART.length)return;
  const sub=subtotal(),tax=taxOn?sub*S.tax:0;
  const head={created_by:USER.id,status:QSTATUS,customer_name:CUST.name||null,customer_addr:CUST.addr||null,
    customer_email:CUST.email||null,
    job_po:CUST.job||null,subtotal:sub,tax_applied:taxOn,tax_rate:S.tax,tax_amount:tax,total:sub+tax};
  try{
    if(!QID){
      const {data,error}=await SB.from('quotes').insert(head).select('id').single();
      if(error)throw error; QID=data.id;
    }else{
      const {error}=await SB.from('quotes').update(head).eq('id',QID);
      if(error)throw error;
    }
    // rewrite items (simple + reliable for small carts)
    await SB.from('quote_items').delete().eq('quote_id',QID);
    if(CART.length){
      const rows=CART.map((c,i)=>{const o=optByCode[c.code].o;return{
        quote_id:QID,item_code:o.real,family:c.fam,tier:c.tier,display_name:optName(o),
        qty:c.qty,unit_price:linePrice(c),line_total:linePrice(c)*c.qty,sort_order:i};});
      const {error}=await SB.from('quote_items').insert(rows);
      if(error)throw error;
    }
    setSync('ok');
  }catch(e){console.warn('sync',e);setSync('off');}
  renderSyncPill();
  if(document.getElementById('drawerQ').classList.contains('on'))renderQuote();
}
function renderSyncPill(){
  const el=document.getElementById('syncPill');if(!el)return;
  const map={idle:['','Not saved yet'],saving:['saving','Saving…'],ok:['ok','Saved to cloud'],off:['off','Offline — saved on device']};
  const [cls,txt]=map[syncState]||map.idle;
  el.className='syncpill '+cls; el.innerHTML='<span class="d"></span>'+txt;
}

/* ---- history ---- */
async function openHistory(){
  document.getElementById('scrimH').classList.add('on');document.getElementById('drawerH').classList.add('on');
  const b=document.getElementById('histBody');
  if(!SB||!USER){b.innerHTML='<div class="empty"><div class="big">Sign in to sync</div>Saved quotes appear here once you are online and signed in.</div>';return;}
  b.innerHTML='<div class="empty">Loading your quotes…</div>';
  try{
    const {data,error}=await SB.from('quotes').select('id,customer_name,total,status,created_at,quote_items(count)').order('created_at',{ascending:false}).limit(100);

    if(!data.length){b.innerHTML='<button class="newq" onclick="newQuote()">+ Start a new quote</button><div class="empty"><div class="big">No quotes yet</div>Build a quote and it saves here automatically.</div>';return;}
    b.innerHTML='<button class="newq" onclick="newQuote()">+ Start a new quote</button>'+data.map(q=>{
      const n=(q.quote_items&&q.quote_items[0]?q.quote_items[0].count:0);
      const d=new Date(q.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return `<button class="histitem" onclick="loadQuote('${q.id}')">
        <div class="hl"><div class="hn">${esc(q.customer_name||'(no name)')}</div>
          <div class="hm">${d} · ${n} item${n==1?'':'s'} <span class="statuspill st-${q.status}">${q.status}</span></div></div>
        <div class="hr"><div class="ht">${money(q.total||0)}</div></div></button>`;}).join('');
  }catch(e){b.innerHTML='<div class="empty"><div class="big">Could not load</div>'+esc(e.message||'')+'</div>';}
}
function closeHistory(){document.getElementById('scrimH').classList.remove('on');document.getElementById('drawerH').classList.remove('on');}
async function loadQuote(id){
  try{
    const {data:q}=await SB.from('quotes').select('*').eq('id',id).single();
    const {data:items}=await SB.from('quote_items').select('*').eq('quote_id',id).order('sort_order');
    QID=q.id;QSTATUS=q.status;CUST={name:q.customer_name||'',addr:q.customer_addr||'',job:q.job_po||'',email:q.customer_email||''};taxOn=q.tax_applied;
    CART=(items||[]).map(it=>{const m=optByCode[it.family+'-'+it.tier];return{code:(m?m.o.code:it.family+'-'+it.tier),fam:it.family,tier:it.tier,qty:it.qty,override:Number(it.unit_price)};});
    await loadPhotos(QID);

function newQuote(){CART=[];CUST={name:'',addr:'',job:'',email:''};QID=null;QSTATUS='draft';taxOn=true;PHOTOS=[];SIG=null;SIG_name='';setSync('idle');
  save();updateBadge();closeHistory();render();renderQuote();}
function setStatus(s){QSTATUS=s;scheduleSave();renderQuote();}

/* ---- photos ---- */
function togglePhotosPdf(){photosOnPdf=!photosOnPdf;renderQuote();}
function renderPhotos(){
  const g=document.getElementById('photoGrid');if(!g)return;
  g.innerHTML=PHOTOS.map((p,i)=>p.uploading
    ? `<div class="photocell up"><div class="ld"></div></div>`
    : `<div class="photocell"><img src="${p.dataUrl}" alt=""><button class="px" onclick="delPhoto(${i})"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>`
  ).join('')+`<button class="addphoto" onclick="document.getElementById('photoFile').click()"><svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.5"/></svg></button>`;
  const note=document.getElementById('photoNote');
  if(note)note.textContent=PHOTOS.length?`${PHOTOS.length} photo${PHOTOS.length>1?'s':''} attached`:'Add before/after or nameplate photos — they upload automatically.';
}
function compressImage(file,maxPx,quality){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>h&&w>maxPx){h=Math.round(h*maxPx/w);w=maxPx;}
      else if(h>maxPx){w=Math.round(w*maxPx/h);h=maxPx;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('bad image'));};
    img.src=url;
  });
}
function dataUrlToBlob(d){const[meta,b64]=d.split(',');const mime=meta.match(/:(.*?);/)[1];
  const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});}
async function ensureQuoteSaved(){
  if(!QID){ if(saveTimer)clearTimeout(saveTimer); await syncQuote(); }
  return QID;
}
async function addPhotos(input){
  const files=[...(input.files||[])];input.value='';
  if(!files.length)return;
  if(!CART.length){alert('Add at least one repair before attaching photos.');return;}
  await ensureQuoteSaved();
  if(!QID){alert('Could not start the quote — check signal and try again.');return;}
  for(const file of files){
    const slot={uploading:true,dataUrl:'',path:''};PHOTOS.push(slot);renderPhotos();
    try{
      const dataUrl=await compressImage(file,1600,0.7);
      slot.dataUrl=dataUrl;
      const blob=dataUrlToBlob(dataUrl);
      const path=`${USER.id}/${QID}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
      const {error}=await SB.storage.from('quote-photos').upload(path,blob,{contentType:'image/jpeg',upsert:false});
      if(error)throw error;
      await SB.from('quote_photos').insert({quote_id:QID,storage_path:path});
      slot.path=path;slot.uploading=false;
    }catch(e){
      console.warn('photo upload',e);
      PHOTOS=PHOTOS.filter(p=>p!==slot);
      alert('A photo failed to upload: '+(e.message||'unknown')+'. It was not saved.');
    }
    renderPhotos();
  }
}
async function delPhoto(i){
  const p=PHOTOS[i];if(!p)return;
  PHOTOS.splice(i,1);renderPhotos();
  try{
    if(p.path){await SB.storage.from('quote-photos').remove([p.path]);
      await SB.from('quote_photos').delete().eq('quote_id',QID).eq('storage_path',p.path);}
  }catch(e){console.warn('photo delete',e);}
}
async function loadPhotos(quoteId){
  PHOTOS=[];
  if(!SB||!USER)return;
  try{
    const {data}=await SB.from('quote_photos').select('storage_path').eq('quote_id',quoteId).order('created_at');
    for(const row of (data||[])){
      try{
        const {data:dl}=await SB.storage.from('quote-photos').download(row.storage_path);
        const dataUrl=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(dl);});
        PHOTOS.push({path:row.storage_path,dataUrl,uploading:false});
      }catch(e){}
    }
  }catch(e){}
}

/* ---- signature ---- */
let SIG_name='';
function initSigPad(){
  const cv=document.getElementById('sigCanvas');if(!cv)return;
  const pad=document.getElementById('sigPad');
  const ratio=window.devicePixelRatio||1;
  const w=pad.clientWidth, h=160;
  cv.width=w*ratio; cv.height=h*ratio;
  sigCtx=cv.getContext('2d'); sigCtx.scale(ratio,ratio);
  sigCtx.lineWidth=2.2; sigCtx.lineCap='round'; sigCtx.lineJoin='round'; sigCtx.strokeStyle='#15181E';
  sigDirty=false;
  const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{e.preventDefault();sigDrawing=true;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);};
  const move=e=>{if(!sigDrawing)return;e.preventDefault();const p=pos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigDirty=true;
    const hint=pad.querySelector('.hint');if(hint)hint.style.display='none';};
  const end=()=>{sigDrawing=false;};
  cv.onmousedown=start;cv.onmousemove=move;window.addEventListener('mouseup',end);
  cv.ontouchstart=start;cv.ontouchmove=move;cv.ontouchend=end;
}
function clearSigPad(){if(sigCtx){const cv=document.getElementById('sigCanvas');sigCtx.clearRect(0,0,cv.width,cv.height);sigDirty=false;
  const h=document.querySelector('#sigPad .hint');if(h)h.style.display='';}}
async function acceptSig(){
  if(!sigDirty){alert('Have the customer sign first.');return;}
  if(!CART.length){alert('Add a repair first.');return;}
  await ensureQuoteSaved();
  if(!QID){alert('Could not save the quote — check signal.');return;}
  const cv=document.getElementById('sigCanvas');
  // trim to a tidy white-background PNG
  const out=document.createElement('canvas');out.width=cv.width;out.height=cv.height;
  const octx=out.getContext('2d');octx.fillStyle='#fff';octx.fillRect(0,0,out.width,out.height);octx.drawImage(cv,0,0);
  const dataUrl=out.toDataURL('image/png');
  const nameEl=document.getElementById('sigName');
  const signerName=(nameEl&&nameEl.value.trim())||SIG_name||CUST.name||'Customer';
  const at=new Date().toISOString();
  const path=`${USER.id}/${QID}/signature.png`;
  try{
    const blob=dataUrlToBlob(dataUrl);
    const {error}=await SB.storage.from('quote-signatures').upload(path,blob,{contentType:'image/png',upsert:true});
    if(error)throw error;
    await SB.from('quotes').update({signed_name:signerName,signed_at:at,signature_path:path,status:'won'}).eq('id',QID);
    SIG={name:signerName,dataUrl,path,at}; QSTATUS='won';
    renderQuote();
  }catch(e){alert('Could not save signature: '+(e.message||'unknown'));}
}
function clearSig(){
  if(!confirm('Remove the signature? This sets the quote back to presented.'))return;
  const path=SIG&&SIG.path;
  SIG=null;QSTATUS='presented';
  (async()=>{try{
    if(path)await SB.storage.from('quote-signatures').remove([path]);
    if(QID)await SB.from('quotes').update({signed_name:null,signed_at:null,signature_path:null,status:'presented'}).eq('id',QID);
  }catch(e){}})();
  renderQuote();
}
async function loadSig(quoteId,q){
  SIG=null;
  if(!SB||!USER||!q||!q.signature_path)return;
  try{
    const {data:dl}=await SB.storage.from('quote-signatures').download(q.signature_path);
    const dataUrl=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(dl);});
    SIG={name:q.signed_name||'Signed',dataUrl,path:q.signature_path,at:q.signed_at};
  }catch(e){}
}
